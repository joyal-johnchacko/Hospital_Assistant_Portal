<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Appointment | MediCare Hospital</title>
    <link rel="stylesheet" href="styleforcreateapp.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="javascript:void(0)" onclick="goBack()" class="btn-back"><i class="fa fa-arrow-left"></i> Back to Dashboard</a></li>
        </ul>
    </nav>

    <main class="container">
        <form id="appointmentForm">
            <h2><i class="fa fa-calendar-plus"></i> Create New Appointment</h2>
            
            <div class="input-group">
                <span class="icon"><i class="fa fa-user"></i></span>
                <input type="text" name="patientName" placeholder="Enter patient name" required>
            </div>

            <div class="input-group">
                <span class="icon"><i class="fa fa-cake-candles"></i></span>
                <input type="number" name="patientAge" placeholder="Enter patient's age" min="0" max="120" required>
            </div>

            <div class="input-group">
                <span class="icon"><i class="fa fa-calendar-days"></i></span>
                <input type="date" name="appointmentDate" required>
            </div>

            <div class="input-group">
                <span class="icon"><i class="fa fa-clock"></i></span>
                <input type="time" name="appointmentTime" required>
            </div>

            <div class="input-group">
                <span class="icon"><i class="fa fa-building"></i></span>
                <select name="department" required>
                    <option value="">Select Department</option>
                    <option value="Cardiology">Cardiology</option>
                    <option value="Neurology">Neurology</option>
                    <option value="Orthopedics">Orthopedics</option>
                    <option value="Pediatrics">Pediatrics</option>
                    <option value="Emergency">Emergency</option>
                    <option value="General Medicine">General Medicine</option>
                    <option value="Dermatology">Dermatology</option>
                    <option value="ENT">ENT (Ear, Nose, Throat)</option>
                    <option value="Gynecology">Gynecology</option>
                    <option value="Ophthalmology">Ophthalmology</option>
                </select>
            </div>

            <div class="input-group">
                <span class="icon"><i class="fa fa-user-doctor"></i></span>
                <select name="doctorName" required>
                    <option value="">Select Doctor</option>
                    <option value="Dr. Smith">Dr. Smith (Cardiology)</option>
                    <option value="Dr. Johnson">Dr. Johnson (Neurology)</option>
                    <option value="Dr. Brown">Dr. Brown (Orthopedics)</option>
                    <option value="Dr. Davis">Dr. Davis (Pediatrics)</option>
                    <option value="Dr. Wilson">Dr. Wilson (Emergency)</option>
                    <option value="Dr. Anderson">Dr. Anderson (General Medicine)</option>
                    <option value="Dr. Taylor">Dr. Taylor (Dermatology)</option>
                    <option value="Dr. White">Dr. White (ENT)</option>
                    <option value="Dr. Garcia">Dr. Garcia (Gynecology)</option>
                    <option value="Dr. Martinez">Dr. Martinez (Ophthalmology)</option>
                </select>
            </div>

            <div class="input-group">
                <span class="icon"><i class="fa fa-notes-medical"></i></span>
                <input type="text" name="reason" placeholder="Enter reason for visit" required>
            </div>

            <button type="submit">
                <i class="fa fa-save"></i> Save Appointment
            </button>
        </form>

        <div id="successMessage" class="success-message">
            <i class="fa fa-check-circle"></i> Appointment booked successfully! Redirecting to dashboard...
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("appointmentForm");
            const successMessage = document.getElementById("successMessage");

            // Set minimum date to today
            const today = new Date().toISOString().split('T')[0];
            document.querySelector('input[name="appointmentDate"]').min = today;

            // Set default date to today
            document.querySelector('input[name="appointmentDate"]').value = today;

            // Form submission handler
            form.addEventListener("submit", function(e) {
                e.preventDefault();

                // Get form data
                const formData = new FormData(form);
                
                // Create appointment object
                const appointment = {
                    id: Date.now(), // Unique ID based on timestamp
                    patientName: formData.get("patientName").trim(),
                    patientAge: parseInt(formData.get("patientAge")),
                    date: formData.get("appointmentDate"),
                    time: formData.get("appointmentTime"),
                    department: formData.get("department"),
                    doctorName: formData.get("doctorName"),
                    reason: formData.get("reason").trim(),
                    status: "Waiting",
                    createdAt: new Date().toISOString()
                };

                console.log("Creating appointment:", appointment);

                try {
                    // Get existing appointments
                    let appointments = JSON.parse(localStorage.getItem("hospitalAppointments")) || [];
                    
                    // Add new appointment
                    appointments.push(appointment);
                    
                    // Save to localStorage
                    localStorage.setItem("hospitalAppointments", JSON.stringify(appointments));
                    
                    console.log("Appointment saved successfully");
                    console.log("Total appointments:", appointments.length);

                    // Show success message
                    successMessage.classList.add("show");

                    // Reset form
                    form.reset();
                    
                    // Set default date back to today
                    document.querySelector('input[name="appointmentDate"]').value = today;

                    // Redirect after 2 seconds
                    setTimeout(() => {
                        goBack();
                    }, 2000);

                } catch (error) {
                    console.error("Error saving appointment:", error);
                    alert("Error saving appointment. Please try again.");
                }
            });

            // Validate appointment time (no past times for today)
            document.querySelector('input[name="appointmentTime"]').addEventListener('change', function() {
                const selectedDate = document.querySelector('input[name="appointmentDate"]').value;
                const selectedTime = this.value;
                const today = new Date().toISOString().split('T')[0];
                
                if (selectedDate === today && selectedTime) {
                    const now = new Date();
                    const currentTime = now.getHours().toString().padStart(2, '0') + ':' + 
                                      now.getMinutes().toString().padStart(2, '0');
                    
                    if (selectedTime < currentTime) {
                        alert('Please select a future time for today\'s appointment');
                        this.value = '';
                    }
                }
            });
        });

        // Go back function
        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
