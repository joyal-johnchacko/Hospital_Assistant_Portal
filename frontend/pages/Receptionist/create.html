<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Appointment | MediCare Hospital</title>
    <link rel="stylesheet" href="styleforcreateapp.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">🏥 MediCare Hospital</div>
    <ul class="nav-links">
      <li><a href="javascript:void(0)" onclick="goBack()" class="btn-back">← Back to Dashboard</a></li>
    </ul>
  </nav>

  <main class="container">
    <div class="appointment-card">
      <div class="card-header">
        <h2><i class="fas fa-calendar-plus"></i> Create New Appointment</h2>
        <p>Schedule a new appointment for patient consultation</p>
      </div>

      <form id="appointmentForm">
        <div class="form-grid">
          
          <div class="input-group">
            <label for="patientName">Patient Name</label>
            <div class="input-wrapper">
              <span class="icon"><i class="fa fa-user"></i></span>
              <input type="text" id="patientName" name="patientName" placeholder="Enter patient name" required>
            </div>
          </div>

          <div class="input-group">
            <label for="patientAge">Patient Age</label>
            <div class="input-wrapper">
              <span class="icon"><i class="fa fa-cake-candles"></i></span>
              <input type="number" id="patientAge" name="patientAge" placeholder="Enter patient's age" min="0" max="120" required>
            </div>
          </div>

          <div class="input-group">
            <label for="appointmentDate">Appointment Date</label>
            <div class="input-wrapper">
              <span class="icon"><i class="fa fa-calendar"></i></span>
              <input type="date" id="appointmentDate" name="appointmentDate" required>
            </div>
          </div>

          <div class="input-group">
            <label for="appointmentTime">Appointment Time</label>
            <div class="input-wrapper">
              <span class="icon"><i class="fa fa-clock"></i></span>
              <select id="appointmentTime" name="appointmentTime" required>
                <option value="">Select time slot</option>
                <option value="09:00">09:00 AM</option>
                <option value="09:15">09:15 AM</option>
                <option value="09:30">09:30 AM</option>
                <option value="09:45">09:45 AM</option>
                <option value="10:00">10:00 AM</option>
                <option value="10:15">10:15 AM</option>
                <option value="10:30">10:30 AM</option>
                <option value="10:45">10:45 AM</option>
                <option value="11:00">11:00 AM</option>
                <option value="11:15">11:15 AM</option>
                <option value="11:30">11:30 AM</option>
                <option value="11:45">11:45 AM</option>
                <option value="12:00">12:00 PM</option>
                <option value="12:15">12:15 PM</option>
                <option value="12:30">12:30 PM</option>
                <option value="12:45">12:45 PM</option>
                <option value="13:00">01:00 PM</option>
                <option value="13:15">01:15 PM</option>
                <option value="13:30">01:30 PM</option>
                <option value="13:45">01:45 PM</option>
                <option value="14:00">02:00 PM</option>
                <option value="14:15">02:15 PM</option>
                <option value="14:30">02:30 PM</option>
                <option value="14:45">02:45 PM</option>
                <option value="15:00">03:00 PM</option>
                <option value="15:15">03:15 PM</option>
                <option value="15:30">03:30 PM</option>
                <option value="15:45">03:45 PM</option>
                <option value="16:00">04:00 PM</option>
                <option value="16:15">04:15 PM</option>
                <option value="16:30">04:30 PM</option>
                <option value="16:45">04:45 PM</option>
                <option value="17:00">05:00 PM</option>
              </select>
            </div>
          </div>
          
          <div class="input-group full-width">
            <label for="doctorName">Doctor</label>
            <div class="input-wrapper">
              <span class="icon"><i class="fa fa-user-doctor"></i></span>
              <select id="doctorName" name="doctorName" required>
                  <option value="">Select Doctor</option>
                  <option value="Dr. Smith">Dr. Smith (Cardiology)</option>
                  <option value="Dr. Johnson">Dr. Johnson (Neurology)</option>
                  <option value="Dr. Brown">Dr. Brown (Orthopedics)</option>
                  <option value="Dr. Davis">Dr. Davis (Pediatrics)</option>
                  <option value="Dr. Wilson">Dr. Wilson (Emergency)</option>
                  <option value="Dr. Anderson">Dr. Anderson (General Medicine)</option>
                  <option value="Dr. Taylor">Dr. Taylor (Dermatology)</option>
                  <option value="Dr. White">Dr. White (ENT)</option>
                  <option value="Dr. Garcia">Dr. Garcia (Gynecology)</option>
                  <option value="Dr. Martinez">Dr. Martinez (Ophthalmology)</option>
              </select>
            </div>
          </div>
          
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save">
            <i class="fas fa-save"></i> Save Appointment
          </button>
        </div>
      </form>
    </div>
  </main>

  <div id="successMessage" class="success-message">
    <i class="fas fa-check-circle"></i>
    <span>Appointment booked successfully! Redirecting...</span>
  </div>

  <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("appointmentForm");
            const successMessage = document.getElementById("successMessage");

            const today = new Date().toISOString().split('T')[0];
            document.querySelector('input[name="appointmentDate"]').min = today;
            document.querySelector('input[name="appointmentDate"]').value = today;

            form.addEventListener("submit", function(e) {
                e.preventDefault();
                const formData = new FormData(form);
                
                // This logic remains the same and will work correctly
                const appointment = {
                    id: Date.now(),
                    patientName: formData.get("patientName").trim(),
                    patientAge: parseInt(formData.get("patientAge")),
                    date: formData.get("appointmentDate"),
                    time: formData.get("appointmentTime"), // Reads from the new <select> perfectly
                    department: formData.get("department"),
                    doctorName: formData.get("doctorName"),
                    reason: formData.get("reason"),
                    status: "Waiting",
                    createdAt: new Date().toISOString()
                };

                try {
                    let appointments = JSON.parse(localStorage.getItem("hospitalAppointments")) || [];
                    appointments.push(appointment);
                    localStorage.setItem("hospitalAppointments", JSON.stringify(appointments));

                    successMessage.style.display = 'flex';
                    form.reset();
                    document.querySelector('input[name="appointmentDate"]').value = today;

                    setTimeout(() => {
                        goBack();
                    }, 2000);
                } catch (error) {
                    console.error("Error saving appointment:", error);
                    alert("Error saving appointment. Please try again.");
                }
            });

            // *** THE ONLY NECESSARY JAVASCRIPT CHANGE IS HERE ***
            // We now look for the <select> element instead of the <input> element.
            document.querySelector('select[name="appointmentTime"]').addEventListener('change', function() {
                const selectedDate = document.querySelector('input[name="appointmentDate"]').value;
                const selectedTime = this.value;
                const today = new Date().toISOString().split('T')[0];
                
                if (selectedDate === today && selectedTime) {
                    const now = new Date();
                    const currentTime = now.getHours().toString().padStart(2, '0') + ':' + 
                                      now.getMinutes().toString().padStart(2, '0');
                    
                    if (selectedTime < currentTime) {
                        alert('Please select a future time for today\'s appointment');
                        this.value = '';
                    }
                }
            });
        });

        function goBack() {
            // Change 'index.html' if your dashboard page has a different name
            window.location.href = 'index.html';
        }
  </script>
</body>
</html>
