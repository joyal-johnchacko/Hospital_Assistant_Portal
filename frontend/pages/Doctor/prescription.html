<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prescription Management | Hospital Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh; color: #334155; }
    .navbar { background: #ffffff; padding: 1.5rem 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
    .nav-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.8rem; font-weight: 700; color: #2563eb; display: flex; align-items: center; gap: 0.5rem; }
    .btn-back { padding: 0.7rem 1.5rem; background: #f1f5f9; color: #475569; text-decoration: none; border-radius: 8px; font-weight: 500; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 0.5rem; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .prescription-header { background: #ffffff; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 2rem; border: 1px solid #e2e8f0; }
    .header-content { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; align-items: start; }
    .page-title { font-size: 2.2rem; font-weight: 700; color: #1e293b; margin-bottom: 0.5rem; }
    .patient-details { display: flex; gap: 2rem; padding: 1.5rem; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
    .patient-field { display: flex; flex-direction: column; }
    .field-label { font-size: 0.85rem; font-weight: 600; color: #64748b; text-transform: uppercase; }
    .field-value { font-size: 1.1rem; font-weight: 600; color: #1e293b; }
    .prescription-meta { text-align: right; color: #64748b; }
    .current-date { font-size: 1.1rem; font-weight: 600; color: #2563eb; margin-bottom: 0.5rem; }
    .prescription-form { background: #ffffff; padding: 2.5rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #e2e8f0; }
    .form-section { margin-bottom: 2.5rem; }
    .section-title { font-size: 1.3rem; font-weight: 600; color: #1e293b; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; padding-bottom: 0.5rem; border-bottom: 2px solid #e2e8f0; }
    .form-label { display: block; font-size: 1rem; font-weight: 600; color: #374151; margin-bottom: 0.5rem; }
    .form-input { width: 100%; padding: 1rem 1.2rem; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem; background: #ffffff; }
    .form-textarea { min-height: 120px; resize: vertical; font-family: inherit; }
    .medicines-container { border: 2px solid #e5e7eb; border-radius: 12px; padding: 1.5rem; background: #fafafa; }
    .medicines-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e7eb; }
    .medicines-title { font-size: 1.2rem; font-weight: 600; color: #1e293b; }
    .btn-add-medicine { padding: 0.6rem 1.2rem; background: #10b981; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; }
    .medicine-row { display: grid; grid-template-columns: 40px 2fr 1.5fr 1fr 1fr 50px; gap: 1rem; align-items: center; padding: 1.2rem; background: #ffffff; border-radius: 8px; margin-bottom: 1rem; border: 1px solid #e5e7eb; }
    .med-index { font-weight: 700; color: #2563eb; font-size: 1.1rem; }
    .med-input { padding: 0.8rem 1rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.95rem; }
    .btn-remove { background: #ef4444; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
    .form-actions { display: flex; gap: 1rem; justify-content: flex-end; padding-top: 2rem; border-top: 2px solid #e5e7eb; margin-top: 2rem; }
    .btn { padding: 1rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-secondary { background: #10b981; color: white; }
    .success-message { background: #dcfce7; color: #166534; padding: 1rem 1.5rem; border-radius: 8px; border: 1px solid #bbf7d0; margin-bottom: 1.5rem; display: none; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-content">
      <div class="logo">🏥 ABC Hospital</div>
      <div class="nav-actions">
        <a href="appointments.html" class="btn-back">← Back to Appointments</a>
      </div>
    </div>
  </nav>
  <div class="container">
    <div class="prescription-header">
      <div class="header-content">
        <div class="patient-info">
          <h1 class="page-title">Create Prescription</h1>
          <div class="patient-details">
            <div class="patient-field"><span class="field-label">Patient Name</span><span class="field-value" id="displayPatientName">Loading...</span></div>
            <div class="patient-field"><span class="field-label">Age</span><span class="field-value" id="displayPatientAge">--</span></div>
            <div class="patient-field"><span class="field-label">Appointment Date</span><span class="field-value" id="displayAppointmentDate">--</span></div>
          </div>
        </div>
        <div class="prescription-meta">
          <div class="current-date" id="currentDate"></div>
          <div>Dr. <span id="doctorName">Smith</span></div>
        </div>
      </div>
    </div>
    <div id="successMessage" class="success-message">✅ Prescription saved successfully!</div>
    <form id="prescriptionForm" class="prescription-form">
      <div class="form-section">
        <h3 class="section-title">🩺 Clinical Diagnosis</h3>
        <div class="form-group">
          <label for="diagnosis" class="form-label">Primary Diagnosis *</label>
          <textarea id="diagnosis" class="form-input form-textarea" placeholder="Enter the primary diagnosis..." required></textarea>
        </div>
      </div>
      <div class="form-section">
        <div class="medicines-container">
          <div class="medicines-header">
            <span class="medicines-title">💊 Prescribed Medications</span>
            <button type="button" id="addMedicineBtn" class="btn-add-medicine">➕ Add Medicine</button>
          </div>
          <div id="medicinesList"></div>
        </div>
      </div>
      <div class="form-section">
        <h3 class="section-title">📋 Medical Advice & Instructions</h3>
        <div class="form-group">
          <label for="advice" class="form-label">General Advice</label>
          <textarea id="advice" class="form-input form-textarea" placeholder="Provide general medical advice..."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" id="savePrescriptionBtn" class="btn btn-secondary">💾 Save Prescription</button>
        <button type="submit" class="btn btn-primary">🖨️ Save & Print</button>
      </div>
    </form>
  </div>
 <script>
    document.addEventListener("DOMContentLoaded", () => {
        const prescForm = document.getElementById("prescriptionForm");
        const medicinesList = document.getElementById("medicinesList");
        const addMedicineBtn = document.getElementById("addMedicineBtn");
        const successMessage = document.getElementById("successMessage");
        const doctorDataString = sessionStorage.getItem('loggedInDoctor');
        const selectedApptString = sessionStorage.getItem('selectedAppointment');
        if (!doctorDataString || !selectedApptString) {
            alert("Could not find login or appointment data. Redirecting...");
            window.location.href = "appointments.html";
            return;
        }
        const doctorData = JSON.parse(doctorDataString);
        const selectedAppt = JSON.parse(selectedApptString);
        document.getElementById("displayPatientName").textContent = selectedAppt.patientName;
        document.getElementById("displayPatientAge").textContent = selectedAppt.patientAge + " years";
        document.getElementById("doctorName").textContent = doctorData.fullName.replace('Dr. ', '');
        const apptDate = new Date(selectedAppt.appointmentDatetime);
        document.getElementById("displayAppointmentDate").textContent = 
            apptDate.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });

        async function savePrescription(shouldPrint = false) {
            const medicines = Array.from(medicinesList.querySelectorAll(".medicine-row")).map(row => ({
                name: row.querySelector(".med-name").value,
                dose: row.querySelector(".med-dose").value,
                timesPerDay: parseInt(row.querySelector(".med-times").value) || 1,
                durationDays: parseInt(row.querySelector(".med-days").value) || 1
            }));
            const prescriptionData = {
                appointmentId: selectedAppt.id,
                patientId: selectedAppt.patientId,
                doctorId: doctorData.id,
                diagnosis: document.getElementById("diagnosis").value,
                advice: document.getElementById("advice").value,
                medicines: medicines
            };
            try {
                const response = await fetch('http://localhost:8080/api/prescriptions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(prescriptionData)
                });
                if (!response.ok) throw new Error('Server failed to save the prescription.');
                const savedPrescription = await response.json();
                successMessage.style.display = 'block';
                setTimeout(() => { successMessage.style.display = 'none'; }, 4000);

                if (shouldPrint) {
                    sessionStorage.setItem('printablePrescription', JSON.stringify({
                        ...savedPrescription,
                        patientName: selectedAppt.patientName,
                        patientAge: selectedAppt.patientAge,
                        patientGender: selectedAppt.patientGender,
                        doctorName: doctorData.fullName
                    }));
                    window.open('print.html', '_blank');
                    // ONLY RESET THE FORM IF PRINTING
                    prescForm.reset();
                    medicinesList.innerHTML = ''; // Clear all medicine rows
                    createMedicineRow();
                }
            } catch (error) {
                console.error("Error saving prescription:", error);
                alert("Could not save prescription. Please check the console for details.");
            }
        }
        document.getElementById("savePrescriptionBtn").addEventListener("click", (e) => {
            e.preventDefault();
            savePrescription(false);
        });
        prescForm.addEventListener("submit", (e) => {
            e.preventDefault();
            savePrescription(true);
        });
        function createMedicineRow() {
            const row = document.createElement("div");
            row.className = "medicine-row";
            row.innerHTML = `
              <span class="med-index"></span>
              <input type="text" placeholder="Medicine name" class="med-input med-name" required>
              <input type="text" placeholder="Dosage (e.g., 500mg)" class="med-input med-dose" required>
              <input type="number" placeholder="Times/day" class="med-input med-times" min="1" required>
              <input type="number" placeholder="Days" class="med-input med-days" min="1" required>
              <button type="button" class="btn-remove">✖</button>
            `;
            row.querySelector(".btn-remove").addEventListener("click", () => { row.remove(); updateMedicineNumbers(); });
            medicinesList.appendChild(row);
            updateMedicineNumbers();
        }
        function updateMedicineNumbers() {
            medicinesList.querySelectorAll(".medicine-row").forEach((row, index) => {
                row.querySelector(".med-index").textContent = (index + 1) + ".";
            });
        }
        function updateDateTime() {
            const now = new Date();
            document.getElementById("currentDate").textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'});
        }
        updateDateTime();
        createMedicineRow();
        addMedicineBtn.addEventListener("click", createMedicineRow);
    });
</script>
</body>
</html>
