<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical Prescription</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Times New Roman', serif; background: #ffffff; color: #000000; line-height: 1.4; font-size: 12pt; }
    @page { size: A4; margin: 0.5in; }
    .prescription-page { width: 8.27in; height: 11.69in; margin: 0 auto; padding: 20px; background: white; border: 3px solid #000; display: flex; flex-direction: column; justify-content: space-between; }
    .header-section { border-bottom: 3px double #000; padding-bottom: 15px; margin-bottom: 20px; }
    .hospital-header { text-align: center; margin-bottom: 15px; }
    .hospital-name { font-size: 24pt; font-weight: bold; }
    .hospital-tagline { font-size: 11pt; font-style: italic; color: #333; }
    .hospital-details { font-size: 10pt; }
    .rx-header { text-align: center; font-size: 18pt; font-weight: bold; margin: 10px 0; text-decoration: underline; }
    .patient-info { display: table; width: 100%; margin-bottom: 20px; border: 2px solid #000; border-collapse: collapse; }
    .patient-row { display: table-row; }
    .patient-label, .patient-value { display: table-cell; padding: 8px 12px; border: 1px solid #000; }
    .patient-label { font-weight: bold; background: #f0f0f0; width: 150px; }
    .prescription-content { flex-grow: 1; }
    .section-title { font-size: 14pt; font-weight: bold; margin: 20px 0 10px 0; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 3px; }
    .diagnosis-box, .advice-box { border: 2px solid #000; padding: 12px; margin-bottom: 20px; min-height: 60px; background: #fafafa; }
    .medications-table { width: 100%; border-collapse: collapse; border: 2px solid #000; margin-bottom: 20px; }
    .medications-table th { background: #000; color: white; padding: 10px 8px; text-align: center; border: 1px solid #000; }
    .medications-table td { border: 1px solid #000; padding: 10px 8px; vertical-align: top; }
    .med-serial { text-align: center; font-weight: bold; }
    .med-name { font-weight: bold; }
    .footer-section { margin-top: auto; border-top: 2px solid #000; padding-top: 15px; }
    .footer-content { display: table; width: 100%; }
    .signature-section, .date-section { display: table-cell; width: 50%; }
    .signature-line { border-bottom: 2px solid #000; width: 200px; height: 50px; margin-bottom: 5px; }
    .doctor-name { font-weight: bold; }
    .date-section { text-align: right; }
    @media print { .no-print { display: none !important; } * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; } }
    @media screen { body { background: #e5e5e5; } .prescription-page { box-shadow: 0 0 20px rgba(0,0,0,0.3); margin: 20px auto; } .print-button, .close-button { position: fixed; top: 20px; background: #007bff; color: white; border: none; padding: 15px 25px; border-radius: 5px; font-size: 14pt; cursor: pointer; z-index: 1000; } .print-button { right: 20px; } .close-button { right: 220px; background: #6c757d;} }
    .empty-state { text-align: center; padding: 40px; }
  </style>
</head>
<body onload="loadPrescription()">
  <button class="print-button no-print" onclick="window.print()">🖨️ Print</button>
  <button class="close-button no-print" onclick="window.close()">❌ Close</button>

  <div class="prescription-page">
    <div class="header-section">
      <div class="hospital-header">
        <div class="hospital-name">🏥 ABC HOSPITAL</div>
        <div class="hospital-tagline">Excellence in Healthcare</div>
      </div>
      <div class="rx-header">℞ PRESCRIPTION</div>
    </div>
    <div class="patient-info">
      <div class="patient-row">
        <div class="patient-label">Patient Name:</div>
        <div class="patient-value" id="patientName"></div>
        <div class="patient-label">Age/Sex:</div>
        <div class="patient-value" id="ageGender"></div>
      </div>
      <div class="patient-row">
        <div class="patient-label">Date:</div>
        <div class="patient-value" id="prescriptionDate"></div>
        <div class="patient-label">Patient ID:</div>
        <div class="patient-value" id="patientId"></div>
      </div>
    </div>
    <div class="prescription-content">
      <div class="section-title">Clinical Diagnosis</div>
      <div class="diagnosis-box" id="diagnosisText"></div>
      <div class="section-title">℞ Prescribed Medications</div>
      <table class="medications-table">
        <thead>
          <tr><th>S.No</th><th>Medicine Name & Strength</th><th>Dosage</th><th>Duration</th></tr>
        </thead>
        <tbody id="medicationsBody"></tbody>
      </table>
      <div class="section-title">Medical Advice</div>
      <div class="advice-box" id="adviceText"></div>
    </div>
    <div class="footer-section">
      <div class="footer-content">
        <div class="signature-section">
          <div class="signature-line"></div>
          <div class="doctor-name" id="doctorName"></div>
        </div>
        <div class="date-section">
          <div><strong>Date:</strong> <span id="footerDate"></span></div>
          <div class="prescription-id" id="prescriptionId"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function loadPrescription() {
      // THIS IS THE MAIN CHANGE: Read from sessionStorage
      const prescriptionString = sessionStorage.getItem("printablePrescription");
      
      if (!prescriptionString) {
        document.querySelector('.prescription-page').innerHTML = `<div class="empty-state"><h2>⚠️ No Prescription Data Found</h2></div>`;
        return;
      }

      const prescription = JSON.parse(prescriptionString);

      const now = new Date(prescription.prescriptionDate);
      const dateStr = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

      // Populate patient information
      document.getElementById("patientName").textContent = prescription.patientName || "N/A";
      document.getElementById("ageGender").textContent = `${prescription.patientAge || '--'} years / ${prescription.patientGender || 'N/A'}`;
      document.getElementById("prescriptionDate").textContent = dateStr;
      document.getElementById("patientId").textContent = `P-${prescription.patientId}`;

      // Populate diagnosis and advice
      document.getElementById("diagnosisText").textContent = prescription.diagnosis || "N/A";
      document.getElementById("adviceText").textContent = prescription.advice || "Follow general health guidelines.";

      // Populate medications
      const medicationsBody = document.getElementById("medicationsBody");
      medicationsBody.innerHTML = "";
      if (prescription.medicines && prescription.medicines.length > 0) {
        prescription.medicines.forEach((medicine, index) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td class="med-serial">${index + 1}</td>
            <td><div class="med-name">${medicine.name} (${medicine.dose})</div></td>
            <td>${medicine.timesPerDay}/day</td>
            <td>${medicine.durationDays} days</td>
          `;
          medicationsBody.appendChild(row);
        });
      }

      // Populate doctor and footer information
      document.getElementById("doctorName").textContent = prescription.doctorName || "N/A";
      document.getElementById("footerDate").textContent = dateStr;
      document.getElementById("prescriptionId").textContent = `Rx ID: ${prescription.id}`;
    }
  </script>
</body>
</html>
