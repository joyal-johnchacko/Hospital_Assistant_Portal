<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prescription - ABC Hospital</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      font-family: "Georgia", serif;
    }

    .prescription-document {
      background: #fff;
      max-width: 700px;
      margin: auto;
      padding: 40px;
      border: 2px solid #333;
      border-radius: 10px;
    }

    .header {
      text-align: center;
      border-bottom: 2px solid #333;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
      color: #004f7c;
    }

    .header h2 {
      margin: 5px 0 0;
      font-size: 18px;
      font-weight: normal;
      color: #555;
    }

    .patient-info {
      margin-bottom: 20px;
      font-size: 16px;
    }

    .patient-info strong {
      display: inline-block;
      width: 120px;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin: 20px 0 10px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
      color: #222;
    }

    .medicines, .advice {
      padding-left: 15px;
      line-height: 1.6;
    }

    .footer {
      margin-top: 40px;
      text-align: right;
      font-style: italic;
    }

    /* Print only the prescription */
    @media print {
      body {
        background: none;
      }
      .prescription-document {
        border: none;
        box-shadow: none;
      }
    }
    * --- Prescription Print Table Styles --- */
.medicines-table {
  width: 100%;
  border-collapse: collapse;
  margin: 15px 0 25px 0;
  font-size: 15px;
}

.medicines-table th,
.medicines-table td {
  border: 1px solid #999;
  padding: 10px 12px;
  text-align: left;
}

.medicines-table th {
  background-color: #f2f2f2;
  font-weight: bold;
  color: #333;
}

.medicines-table td:first-child {
  text-align: center;
  width: 50px;
  font-weight: bold;
}
  </style>
</head>
<body onload="window.print()">
  <div class="prescription-document">
    <div class="header">
      <h1>🏥 ABC Hospital</h1>
      <h2>Doctor’s Prescription</h2>
    </div>

    <div class="patient-info">
  <p><strong>Patient:</strong> <span id="printPatient"></span></p>
  <p><strong>Age:</strong> <span id="printAge"></span></p> <p><strong>Date:</strong> <span id="printDate"></span></p>
  </div>

    <div class="section-title">Diagnosis</div>
    <p id="printDiagnosis"></p>

    <div class="section-title">Medicines (Rx)</div>

<table class="medicines-table">
  <thead>
    <tr>
      <th>S.No.</th>
      <th>Medicine Name</th>
      <th>Dosage</th>
      <th>Frequency</th>
    </tr>
  </thead>
  <tbody id="printMedicines">
    </tbody>
</table>

    <div class="section-title">Advice</div>
    <div class="advice" id="printAdvice"></div>

    <div class="footer">
      <p>Doctor’s Signature: __________________</p>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Insert today's date
    document.getElementById("printDate").innerText = new Date().toLocaleDateString();
    if (window.location.pathname.endsWith("print.html")) {
  const presc = JSON.parse(localStorage.getItem("prescription"));
  if (presc) {
    document.getElementById("printPatient").innerText = presc.patientName;
    document.getElementById("printDiagnosis").innerText = presc.diagnosis;
    document.getElementById("printAdvice").innerText = presc.advice;

    // Fill medicines table
    const medTable = document.getElementById("printMedicines");
    presc.medicines.forEach(med => {
      let row = document.createElement("tr");
      row.innerHTML = `
        <td>${med.name}</td>
        <td>${med.dose}</td>
        <td>${med.times}</td>
      `;
      medTable.appendChild(row);
    });
  }
}
  </script>
</body>
</html>
