<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Doctor - Healthcare Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #2563eb; --primary-hover: #1d4ed8; --secondary-color: #64748b;
      --success-color: #059669; --background-primary: #0f172a; --background-card: rgba(30, 41, 59, 0.8);
      --background-input: rgba(51, 65, 85, 0.6); --text-primary: #f8fafc; --text-secondary: #cbd5e1;
      --text-muted: #94a3b8; --border-color: rgba(148, 163, 184, 0.2); --border-focus: rgba(37, 99, 235, 0.5);
      --danger-color: #dc2626; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem;
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: var(--text-primary); min-height: 100vh; padding: 2rem 1rem;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .form-container {
      background: var(--background-card); backdrop-filter: blur(20px); border: 1px solid var(--border-color);
      border-radius: var(--radius-xl); box-shadow: var(--shadow-xl); padding: 2.5rem;
    }
    .form-header { text-align: center; margin-bottom: 2.5rem; }
    .form-icon {
      width: 4rem; height: 4rem; background: linear-gradient(135deg, var(--success-color), #10b981);
      border-radius: var(--radius-xl); display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; font-size: 2rem; color: var(--text-primary);
    }
    .form-title { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .form-subtitle { color: var(--text-muted); font-size: 1rem; }
    .form { display: flex; flex-direction: column; gap: 1.5rem; }
    .form-label { display: block; font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .input-wrapper { position: relative; }
    .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .form-input {
      width: 100%; padding: 1rem 1rem 1rem 3rem; background: var(--background-input); border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); color: var(--text-primary); font-size: 1rem; outline: none;
    }
    
    /* RESTORED SPECIALIZATION STYLES */
    .specialization-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.75rem;
    }
    .specialization-option { position: relative; }
    .specialization-input { position: absolute; opacity: 0; }
    .specialization-label {
      display: flex; align-items: center; justify-content: center; padding: 0.75rem 1rem;
      background: var(--background-input); border: 1px solid var(--border-color);
      border-radius: var(--radius-md); cursor: pointer; transition: all 0.3s ease;
      font-size: 0.85rem; text-align: center; color: var(--text-secondary);
    }
    .specialization-input:checked + .specialization-label {
      background: linear-gradient(135deg, var(--primary-color), #3b82f6);
      border-color: var(--primary-color); color: var(--text-primary);
      transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }
    /* END OF RESTORED STYLES */

    .form-actions { display: flex; gap: 1rem; margin-top: 1rem; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 1rem 2rem; border: none; border-radius: var(--radius-lg);
      font-size: 1rem; font-weight: 600; cursor: pointer; text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary-color), #3b82f6);
      color: var(--text-primary); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
      flex: 1;
    }
    .btn-secondary { background: linear-gradient(135deg, var(--secondary-color), #475569); color: var(--text-primary); }
    .toast {
      position: fixed; top: 2rem; right: 2rem; background: var(--background-card);
      border: 1px solid var(--border-color); border-radius: var(--radius-lg);
      padding: 1rem 1.5rem; box-shadow: var(--shadow-xl); transform: translateX(400px);
      transition: transform 0.3s ease; z-index: 1000; display: flex; align-items: center; gap: 1rem;
    }
    .toast.show { transform: translateX(0); }
    .toast.success { border-left: 4px solid var(--success-color); }
    .toast.error { border-left: 4px solid var(--danger-color); }
    .toast-icon { font-size: 1.25rem; }
    .toast.success .toast-icon { color: var(--success-color); }
    .toast.error .toast-icon { color: var(--danger-color); }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-container">
      <div class="form-header">
        <div class="form-icon"><i class="fas fa-user-md"></i></div>
        <h1 class="form-title">Add New Doctor</h1>
        <p class="form-subtitle">Enter the doctor's information to add them to the system</p>
      </div>
      <form id="addDoctorForm" class="form" novalidate>
        <div class="form-group">
          <label for="fullName" class="form-label">Full Name</label>
          <div class="input-wrapper">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="fullName" name="fullName" class="form-input" placeholder="Enter full name" required>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">Specialization</label>
          <div class="specialization-grid">
            <div class="specialization-option">
              <input type="radio" id="cardiology" name="specialization" value="Cardiology" class="specialization-input" required>
              <label for="cardiology" class="specialization-label">Cardiology</label>
            </div>
            <div class="specialization-option">
              <input type="radio" id="neurology" name="specialization" value="Neurology" class="specialization-input">
              <label for="neurology" class="specialization-label">Neurology</label>
            </div>
            <div class="specialization-option">
              <input type="radio" id="orthopedics" name="specialization" value="Orthopedics" class="specialization-input">
              <label for="orthopedics" class="specialization-label">Orthopedics</label>
            </div>
            <div class="specialization-option">
              <input type="radio" id="pediatrics" name="specialization" value="Pediatrics" class="specialization-input">
              <label for="pediatrics" class="specialization-label">Pediatrics</label>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label for="phone" class="form-label">Phone Number</label>
          <div class="input-wrapper">
            <i class="fas fa-phone input-icon"></i>
            <input type="tel" id="phone" name="phone" class="form-input" placeholder="Enter phone number" required>
          </div>
        </div>
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" name="email" class="form-input" placeholder="Enter email address" required>
          </div>
        </div>
        <div class="form-group">
          <label for="experience" class="form-label">Experience (Years)</label>
          <div class="input-wrapper">
            <i class="fas fa-calendar-alt input-icon"></i>
            <input type="number" id="experience" name="experience" class="form-input" placeholder="e.g., 5" min="0" max="50">
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submitBtn">Add Doctor</button>
          <a href="admin.html" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
  <div class="toast" id="toast">
    <div class="toast-icon"></div>
    <div class="toast-content"></div>
  </div>

  <script>
    document.getElementById('addDoctorForm').addEventListener('submit', function (e) {
      e.preventDefault();

      // Basic validation
      const fullName = document.getElementById('fullName').value;
      const specialization = this.querySelector('input[name="specialization"]:checked');
      if (!fullName || !specialization) {
          alert('Full Name and Specialization are required.');
          return;
      }

      // Prepare data for API
      const formData = new FormData(this);
      const doctorData = {
          fullName: formData.get('fullName'),
          specialization: formData.get('specialization'),
          phone: formData.get('phone'),
          email: formData.get('email'),
          experience: parseInt(formData.get('experience')) || 0
      };

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Adding...';

      // API Call using fetch
      fetch('http://localhost:8080/api/doctors/add', {
          method: 'POST',
          headers: {
              'Content-Type': 'application/json',
          },
          body: JSON.stringify(doctorData),
      })
      .then(response => {
          if (!response.ok) {
              return response.text().then(text => { throw new Error(text) });
          }
          return response.text();
      })
      .then(successMessage => {
          showToast(successMessage, 'success');
          submitBtn.textContent = 'Add Doctor';
          submitBtn.disabled = false;
          e.target.reset();
      })
      .catch(error => {
          console.error('Error:', error);
          showToast(error.message || 'An error occurred.', 'error');
          submitBtn.textContent = 'Add Doctor';
          submitBtn.disabled = false;
      });
    });

    // Toast notification function
    function showToast(message, type) {
        const toast = document.getElementById('toast');
        const icon = toast.querySelector('.toast-icon');
        const content = toast.querySelector('.toast-content');
        icon.innerHTML = type === 'success' ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-exclamation-circle"></i>';
        content.textContent = message;
        toast.className = `toast ${type}`;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 4000);
    }
  </script>
</body>
</html>
