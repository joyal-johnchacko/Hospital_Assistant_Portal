<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Doctor - Healthcare Management System</title>
  <meta name="description" content="Add a new doctor to the healthcare management system">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --secondary-color: #64748b;
      --secondary-hover: #475569;
      --success-color: #059669;
      --success-hover: #047857;
      --danger-color: #dc2626;
      --danger-hover: #b91c1c;
      --warning-color: #d97706;
      --info-color: #0891b2;
      --background-primary: #0f172a;
      --background-secondary: #1e293b;
      --background-card: rgba(30, 41, 59, 0.8);
      --background-input: rgba(51, 65, 85, 0.6);
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --border-color: rgba(148, 163, 184, 0.2);
      --border-focus: rgba(37, 99, 235, 0.5);
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: 2rem 1rem;
    }

    /* Animated background particles */
    .background-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 20s infinite linear;
    }

    .particle:nth-child(1) { width: 80px; height: 80px; top: 10%; left: 10%; animation-delay: 0s; }
    .particle:nth-child(2) { width: 60px; height: 60px; top: 70%; left: 80%; animation-delay: -5s; }
    .particle:nth-child(3) { width: 100px; height: 100px; top: 40%; left: 70%; animation-delay: -10s; }
    .particle:nth-child(4) { width: 40px; height: 40px; top: 80%; left: 20%; animation-delay: -15s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
      25% { transform: translateY(-20px) rotate(90deg); opacity: 0.6; }
      50% { transform: translateY(-40px) rotate(180deg); opacity: 0.3; }
      75% { transform: translateY(-20px) rotate(270deg); opacity: 0.6; }
    }

    /* Container */
    .container {
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .breadcrumb a {
      color: var(--primary-color);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .breadcrumb a:hover {
      color: var(--primary-hover);
    }

    .breadcrumb-separator {
      color: var(--text-muted);
    }

    /* Form container */
    .form-container {
      background: var(--background-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .form-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary-color), var(--success-color), var(--primary-color));
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 200% 0; }
      50% { background-position: -200% 0; }
    }

    /* Header */
    .form-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .form-icon {
      width: 4rem;
      height: 4rem;
      background: linear-gradient(135deg, var(--success-color), #10b981);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
      color: var(--text-primary);
    }

    .form-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--primary-color), #3b82f6);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .form-subtitle {
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* Form styling */
    .form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-group {
      position: relative;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .form-label.required::after {
      content: ' *';
      color: var(--danger-color);
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
      pointer-events: none;
      transition: color 0.3s ease;
    }

    .form-input {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      background: var(--background-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      background: rgba(51, 65, 85, 0.8);
    }

    .form-input:focus + .input-icon {
      color: var(--primary-color);
    }

    .form-input.error {
      border-color: var(--danger-color);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
    }

    .form-input.success {
      border-color: var(--success-color);
      box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
    }

    /* Validation messages */
    .form-message {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      margin-top: 0.5rem;
      opacity: 0;
      transform: translateY(-5px);
      transition: all 0.3s ease;
    }

    .form-message.show {
      opacity: 1;
      transform: translateY(0);
    }

    .form-message.error {
      color: var(--danger-color);
    }

    .form-message.success {
      color: var(--success-color);
    }

    /* Specialization select */
    .specialization-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    .specialization-option {
      position: relative;
    }

    .specialization-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .specialization-label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1rem;
      background: var(--background-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.85rem;
      text-align: center;
      color: var(--text-secondary);
    }

    .specialization-input:checked + .specialization-label {
      background: linear-gradient(135deg, var(--primary-color), #3b82f6);
      border-color: var(--primary-color);
      color: var(--text-primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .specialization-label:hover {
      border-color: var(--border-focus);
      background: rgba(51, 65, 85, 0.8);
    }

    /* Form actions */
    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 2rem;
      border: none;
      border-radius: var(--radius-lg);
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      min-height: 3.25rem;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-color), #3b82f6);
      color: var(--text-primary);
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
      flex: 1;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-hover), var(--primary-color));
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
    }

    .btn-secondary {
      background: linear-gradient(135deg, var(--secondary-color), #475569);
      color: var(--text-primary);
      box-shadow: 0 4px 15px rgba(100, 116, 139, 0.3);
    }

    .btn-secondary:hover {
      background: linear-gradient(135deg, var(--secondary-hover), var(--secondary-color));
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(100, 116, 139, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn.loading {
      pointer-events: none;
    }

    .btn.loading::after {
      content: '';
      position: absolute;
      width: 1rem;
      height: 1rem;
      border: 2px solid transparent;
      border-top: 2px solid currentColor;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Success animation */
    .success-checkmark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      background: var(--success-color);
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1rem;
    }

    .btn.success .success-checkmark {
      display: flex;
      animation: successPulse 0.6s ease;
    }

    @keyframes successPulse {
      0% { transform: translate(-50%, -50%) scale(0); }
      50% { transform: translate(-50%, -50%) scale(1.2); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    /* Toast notifications */
    .toast {
      position: fixed;
      top: 2rem;
      right: 2rem;
      background: var(--background-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1rem 1.5rem;
      box-shadow: var(--shadow-xl);
      backdrop-filter: blur(20px);
      transform: translateX(400px);
      transition: transform 0.3s ease;
      z-index: 1000;
      max-width: 350px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .toast.show {
      transform: translateX(0);
    }

    .toast.success {
      border-left: 4px solid var(--success-color);
    }

    .toast.error {
      border-left: 4px solid var(--danger-color);
    }

    .toast-icon {
      font-size: 1.25rem;
    }

    .toast.success .toast-icon {
      color: var(--success-color);
    }

    .toast.error .toast-icon {
      color: var(--danger-color);
    }

    /* Responsive design */
    @media (max-width: 768px) {
      body {
        padding: 1rem 0.5rem;
      }

      .form-container {
        padding: 2rem 1.5rem;
      }

      .form-title {
        font-size: 1.75rem;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .form-actions {
        flex-direction: column;
      }

      .specialization-grid {
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      }

      .toast {
        right: 1rem;
        left: 1rem;
        max-width: none;
      }
    }

    @media (max-width: 480px) {
      .form-container {
        padding: 1.5rem 1rem;
      }

      .form-title {
        font-size: 1.5rem;
      }

      .btn {
        padding: 0.875rem 1.5rem;
        font-size: 0.9rem;
      }
    }

    /* Focus states for accessibility */
    .btn:focus,
    .form-input:focus,
    .specialization-label:focus {
      outline: 2px solid var(--primary-color);
      outline-offset: 2px;
    }

    /* High contrast mode support */
    @media (prefers-contrast: high) {
      :root {
        --background-card: rgba(0, 0, 0, 0.9);
        --border-color: rgba(255, 255, 255, 0.5);
      }
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Screen reader only class */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <!-- Animated background -->
  <div class="background-animation">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Main container -->
  <div class="container">
    <!-- Breadcrumb -->
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="admin.html">Admin Dashboard</a>
      <span class="breadcrumb-separator">/</span>
      <a href="users.html">User Management</a>
      <span class="breadcrumb-separator">/</span>
      <span>Add Doctor</span>
    </nav>

    <!-- Form container -->
    <div class="form-container">
      <!-- Form header -->
      <div class="form-header">
        <div class="form-icon">
          <i class="fas fa-user-md" aria-hidden="true"></i>
        </div>
        <h1 class="form-title">Add New Doctor</h1>
        <p class="form-subtitle">Enter the doctor's information to add them to your healthcare system</p>
      </div>

      <!-- Add doctor form -->
      <form id="addDoctorForm" class="form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="firstName" class="form-label required">First Name</label>
            <div class="input-wrapper">
              <input type="text" id="firstName" name="firstName" class="form-input" placeholder="Enter first name" required>
              <i class="fas fa-user input-icon" aria-hidden="true"></i>
            </div>
            <div class="form-message" id="firstNameMessage">
              <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
              <span></span>
            </div>
          </div>

          <div class="form-group">
            <label for="lastName" class="form-label required">Last Name</label>
            <div class="input-wrapper">
              <input type="text" id="lastName" name="lastName" class="form-input" placeholder="Enter last name" required>
              <i class="fas fa-user input-icon" aria-hidden="true"></i>
            </div>
            <div class="form-message" id="lastNameMessage">
              <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
              <span></span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label required">Specialization</label>
          <div class="specialization-grid">
            <div class="specialization-option">
              <input type="radio" id="cardiology" name="specialization" value="Cardiology" class="specialization-input" required>
              <label for="cardiology" class="specialization-label">Cardiology</label>
            </div>
            <div class="specialization-option">
              <input type="radio" id="neurology" name="specialization" value="Neurology" class="specialization-input">
              <label for="neurology" class="specialization-label">Neurology</label>
            </div>
            <div class="specialization-option">
              <input type="radio" id="orthopedics" name="specialization" value="Orthopedics" class="specialization-input">
              <label for="orthopedics" class="specialization-label">Orthopedics</label>
            </div>
            <div class="specialization-option">
              <input type="radio" id="pediatrics" name="specialization" value="Pediatrics" class="specialization-input">
              <label for="pediatrics" class="specialization-label">Pediatrics</label>
            </div>
            <div class="specialization-option">
              <input type="radio" id="dermatology" name="specialization" value="Dermatology" class="specialization-input">
              <label for="dermatology" class="specialization-label">Dermatology</label>
            </div>
            <div class="specialization-option">
              <input type="radio" id="general" name="specialization" value="General Medicine" class="specialization-input">
              <label for="general" class="specialization-label">General</label>
            </div>
          </div>
          <div class="form-message" id="specializationMessage">
            <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
            <span></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="phone" class="form-label required">Phone Number</label>
            <div class="input-wrapper">
              <input type="tel" id="phone" name="phone" class="form-input" placeholder="+1 (555) 123-4567" required>
              <i class="fas fa-phone input-icon" aria-hidden="true"></i>
            </div>
            <div class="form-message" id="phoneMessage">
              <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
              <span></span>
            </div>
          </div>

          <div class="form-group">
            <label for="email" class="form-label required">Email Address</label>
            <div class="input-wrapper">
              <input type="email" id="email" name="email" class="form-input" placeholder="doctor@hospital.com" required>
              <i class="fas fa-envelope input-icon" aria-hidden="true"></i>
            </div>
            <div class="form-message" id="emailMessage">
              <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
              <span></span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="license" class="form-label required">Medical License</label>
            <div class="input-wrapper">
              <input type="text" id="license" name="license" class="form-input" placeholder="License number" required>
              <i class="fas fa-id-card input-icon" aria-hidden="true"></i>
            </div>
            <div class="form-message" id="licenseMessage">
              <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
              <span></span>
            </div>
          </div>

          <div class="form-group">
            <label for="experience" class="form-label">Experience (Years)</label>
            <div class="input-wrapper">
              <input type="number" id="experience" name="experience" class="form-input" placeholder="Years of experience" min="0" max="50">
              <i class="fas fa-calendar-alt input-icon" aria-hidden="true"></i>
            </div>
            <div class="form-message" id="experienceMessage">
              <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
              <span></span>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submitBtn">
            <i class="fas fa-plus" aria-hidden="true"></i>
            <span>Add Doctor</span>
            <div class="success-checkmark">
              <i class="fas fa-check"></i>
            </div>
          </button>
          <a href="users.html" class="btn btn-secondary">
            <i class="fas fa-arrow-left" aria-hidden="true"></i>
            <span>Back to Users</span>
          </a>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast">
    <div class="toast-icon"></div>
    <div class="toast-content"></div>
  </div>

  <script>
    class DoctorFormValidator {
      constructor() {
        this.form = document.getElementById('addDoctorForm');
        this.submitBtn = document.getElementById('submitBtn');
        this.init();
      }

      init() {
        this.attachEventListeners();
        this.setupRealTimeValidation();
      }

      attachEventListeners() {
        this.form.addEventListener('submit', this.handleSubmit.bind(this));
        
        // Real-time validation for all inputs
        const inputs = this.form.querySelectorAll('.form-input');
        inputs.forEach(input => {
          input.addEventListener('blur', () => this.validateField(input));
          input.addEventListener('input', () => this.clearFieldError(input));
        });

        // Specialization validation
        const specializationInputs = this.form.querySelectorAll('input[name="specialization"]');
        specializationInputs.forEach(input => {
          input.addEventListener('change', () => this.validateSpecialization());
        });

        // Phone number formatting
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', this.formatPhoneNumber.bind(this));
      }

      setupRealTimeValidation() {
        // Enable submit button only when form is valid
        const inputs = this.form.querySelectorAll('input[required]');
        inputs.forEach(input => {
          input.addEventListener('input', () => {
            setTimeout(() => this.updateSubmitButton(), 100);
          });
        });
      }

      validateField(input) {
        const fieldName = input.name;
        const value = input.value.trim();
        let isValid = true;
        let message = '';

        switch (fieldName) {
          case 'firstName':
          case 'lastName':
            if (!value) {
              isValid = false;
              message = `${fieldName === 'firstName' ? 'First' : 'Last'} name is required`;
            } else if (value.length < 2) {
              isValid = false;
              message = 'Name must be at least 2 characters long';
            } else if (!/^[a-zA-Z\s'-]+$/.test(value)) {
              isValid = false;
              message = 'Name can only contain letters, spaces, hyphens, and apostrophes';
            }
            break;

          case 'email':
            if (!value) {
              isValid = false;
              message = 'Email address is required';
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
              isValid = false;
              message = 'Please enter a valid email address';
            }
            break;

          case 'phone':
            if (!value) {
              isValid = false;
              message = 'Phone number is required';
            } else if (!/^\+?[\d\s\-\(\)]{10,}$/.test(value)) {
              isValid = false;
              message = 'Please enter a valid phone number';
            }
            break;

          case 'license':
            if (!value) {
              isValid = false;
              message = 'Medical license number is required';
            } else if (value.length < 5) {
              isValid = false;
              message = 'License number must be at least 5 characters';
            }
            break;

          case 'experience':
            if (value && (isNaN(value) || value < 0 || value > 50)) {
              isValid = false;
              message = 'Experience must be between 0 and 50 years';
            }
            break;
        }

        this.showFieldValidation(input, isValid, message);
        return isValid;
      }

      validateSpecialization() {
        const specializationInputs = this.form.querySelectorAll('input[name="specialization"]');
        const isSelected = Array.from(specializationInputs).some(input => input.checked);
        
        if (!isSelected) {
          this.showSpecializationError('Please select a specialization');
          return false;
        } else {
          this.clearSpecializationError();
          return true;
        }
      }

      showFieldValidation(input, isValid, message) {
        const messageElement = document.getElementById(`${input.name}Message`);
        const messageSpan = messageElement.querySelector('span');
        const icon = messageElement.querySelector('i');

        if (isValid) {
          input.classList.remove('error');
          input.classList.add('success');
          messageElement.classList.remove('show', 'error');
          messageElement.classList.add('success');
          icon.className = 'fas fa-check-circle';
          messageSpan.textContent = 'Looks good!';
          setTimeout(() => messageElement.classList.add('show'), 10);
        } else {
          input.classList.remove('success');
          input.classList.add('error');
          messageElement.classList.remove('show', 'success');
          messageElement.classList.add('error');
          icon.className = 'fas fa-exclamation-circle';
          messageSpan.textContent = message;
          setTimeout(() => messageElement.classList.add('show'), 10);
        }
      }

      clearFieldError(input) {
        const messageElement = document.getElementById(`${input.name}Message`);
        input.classList.remove('error');
        messageElement.classList.remove('show');
      }

      showSpecializationError(message) {
        const messageElement = document.getElementById('specializationMessage');
        const messageSpan = messageElement.querySelector('span');
        const icon = messageElement.querySelector('i');

        messageElement.classList.remove('show', 'success');
        messageElement.classList.add('error');
        icon.className = 'fas fa-exclamation-circle';
        messageSpan.textContent = message;
        setTimeout(() => messageElement.classList.add('show'), 10);
      }

      clearSpecializationError() {
        const messageElement = document.getElementById('specializationMessage');
        messageElement.classList.remove('show', 'error');
        messageElement.classList.add('success');
        const icon = messageElement.querySelector('i');
        const messageSpan = messageElement.querySelector('span');
        icon.className = 'fas fa-check-circle';
        messageSpan.textContent = 'Specialization selected';
        setTimeout(() => messageElement.classList.add('show'), 10);
      }

      formatPhoneNumber(e) {
        let value = e.target.value.replace(/\D/g, '');
        
        if (value.length >= 6) {
          value = value.replace(/(\d{3})(\d{3})(\d{4})/, '($1) $2-$3');
        } else if (value.length >= 3) {
          value = value.replace(/(\d{3})(\d{1,3})/, '($1) $2');
        }
        
        e.target.value = value;
      }

      updateSubmitButton() {
        const inputs = this.form.querySelectorAll('input[required]');
        const specializationSelected = this.form.querySelector('input[name="specialization"]:checked');
        
        const allValid = Array.from(inputs).every(input => {
          return input.value.trim() !== '' && !input.classList.contains('error');
        }) && specializationSelected;

        this.submitBtn.disabled = !allValid;
      }

      async handleSubmit(e) {
        e.preventDefault();

        // Validate all fields
        const inputs = this.form.querySelectorAll('.form-input');
        let allValid = true;

        inputs.forEach(input => {
          if (!this.validateField(input)) {
            allValid = false;
          }
        });

        if (!this.validateSpecialization()) {
          allValid = false;
        }

        if (!allValid) {
          this.showToast('Please correct the errors above', 'error');
          return;
        }

        // Show loading state
        this.submitBtn.classList.add('loading');
        this.submitBtn.disabled = true;

        try {
          // Simulate API call delay
          await this.delay(2000);

          // Get form data
          const formData = new FormData(this.form);
          const doctorData = {
            id: Date.now(), // Simple ID generation
            firstName: formData.get('firstName').trim(),
            lastName: formData.get('lastName').trim(),
            fullName: `${formData.get('firstName').trim()} ${formData.get('lastName').trim()}`,
            specialization: formData.get('specialization'),
            phone: formData.get('phone').trim(),
            email: formData.get('email').trim().toLowerCase(),
            license: formData.get('license').trim(),
            experience: formData.get('experience') || '0',
            dateAdded: new Date().toISOString(),
            status: 'active'
          };

          // Store in memory (since localStorage is not supported)
          // Save to localStorage
          let doctors = JSON.parse(localStorage.getItem("doctors")) || [];
          doctors.push(doctorData);
          localStorage.setItem("doctors", JSON.stringify(doctors));


          // Show success state
          this.submitBtn.classList.remove('loading');
          this.submitBtn.classList.add('success');

          // Show success message
          this.showToast('Doctor added successfully!', 'success');

          // Reset form after delay
          setTimeout(() => {
            this.form.reset();
            this.clearAllValidation();
            this.submitBtn.classList.remove('success');
            this.submitBtn.disabled = false;
            
            // Redirect after successful submission
            setTimeout(() => {
              window.location.href = 'users.html';
            }, 1000);
          }, 2000);

        } catch (error) {
          console.error('Error adding doctor:', error);
          this.submitBtn.classList.remove('loading');
          this.submitBtn.disabled = false;
          this.showToast('Failed to add doctor. Please try again.', 'error');
        }
      }

      clearAllValidation() {
        const inputs = this.form.querySelectorAll('.form-input');
        const messages = this.form.querySelectorAll('.form-message');

        inputs.forEach(input => {
          input.classList.remove('error', 'success');
        });

        messages.forEach(message => {
          message.classList.remove('show', 'error', 'success');
        });
      }

      delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }

      showToast(message, type) {
        const toast = document.getElementById('toast');
        const icon = toast.querySelector('.toast-icon');
        const content = toast.querySelector('.toast-content');

        // Set icon based on type
        if (type === 'success') {
          icon.innerHTML = '<i class="fas fa-check-circle"></i>';
        } else if (type === 'error') {
          icon.innerHTML = '<i class="fas fa-exclamation-circle"></i>';
        } else {
          icon.innerHTML = '<i class="fas fa-info-circle"></i>';
        }

        content.textContent = message;
        toast.className = `toast ${type}`;
        toast.classList.add('show');

        setTimeout(() => {
          toast.classList.remove('show');
        }, 4000);
      }
    }

    // Initialize form validator when DOM is loaded
    document.addEventListener('DOMContentLoaded', function() {
      new DoctorFormValidator();

      // Keyboard navigation improvements
      document.addEventListener('keydown', function(e) {
        // Enable form submission with Ctrl+Enter
        if (e.ctrlKey && e.key === 'Enter') {
          const submitBtn = document.getElementById('submitBtn');
          if (!submitBtn.disabled) {
            submitBtn.click();
          }
        }

        // Clear focus on Escape
        if (e.key === 'Escape') {
          const activeElement = document.activeElement;
          if (activeElement && activeElement.classList.contains('form-input')) {
            activeElement.blur();
          }
        }
      });

      // Auto-capitalize names
      const nameInputs = document.querySelectorAll('#firstName, #lastName');
      nameInputs.forEach(input => {
        input.addEventListener('input', function(e) {
          const words = e.target.value.split(' ');
          const capitalizedWords = words.map(word => 
            word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
          );
          e.target.value = capitalizedWords.join(' ');
        });
      });

      // Email validation helper
      const emailInput = document.getElementById('email');
      emailInput.addEventListener('blur', function() {
        if (this.value) {
          this.value = this.value.toLowerCase().trim();
        }
      });

      // License number formatting
      const licenseInput = document.getElementById('license');
      licenseInput.addEventListener('input', function() {
        this.value = this.value.toUpperCase();
      });

      console.log('Add Doctor form initialized successfully');
    });

    // Handle page unload with unsaved changes
    window.addEventListener('beforeunload', function(e) {
      const form = document.getElementById('addDoctorForm');
      const formData = new FormData(form);
      let hasData = false;

      for (let [key, value] of formData.entries()) {
        if (value.trim()) {
          hasData = true;
          break;
        }
      }

      if (hasData) {
        e.preventDefault();
        e.returnValue = '';
        return 'You have unsaved changes. Are you sure you want to leave?';
      }
    });
  </script>
</body>
</html>
