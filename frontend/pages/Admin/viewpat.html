<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - View Patients</title>
    <style>
        /* General body and container */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid #ccc;
        }

        th, td {
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
            color: #333;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .delete-btn {
            padding: 5px 10px;
            color: white;
            background-color: red;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .delete-btn:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>All Registered Patients</h2>
        <table>
            <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Password</th>
                    <th>Age</th>
                    <th>Phone</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="patientTable"></tbody>
        </table>
    </div>

    <script>
        const patientTable = document.getElementById("patientTable");

        // Fetch patients from localStorage
        let patients = JSON.parse(localStorage.getItem("patients")) || [];

        // Function to render the table
        function renderPatients() {
            patientTable.innerHTML = ""; // clear existing rows

            if (patients.length === 0) {
                const row = document.createElement("tr");
                row.innerHTML = `<td colspan="5" style="text-align:center;">No patients found.</td>`;
                patientTable.appendChild(row);
                return;
            }

            patients.forEach((patient, index) => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${patient.fullName}</td>
                    <td>****</td>
                    <td>${patient.age}</td>
                    <td>${patient.phone}</td>
                    <td><button class="delete-btn" onclick="deletePatient(${index})">Delete</button></td>
                `;
                patientTable.appendChild(row);
            });
        }

        // Delete patient
        function deletePatient(index) {
            if (confirm("Are you sure you want to delete this patient?")) {
                patients.splice(index, 1);
                localStorage.setItem("patients", JSON.stringify(patients));
                renderPatients();
            }
        }

        // Initial render
        renderPatients();
    </script>
</body>
</html>
