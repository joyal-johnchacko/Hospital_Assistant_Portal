<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients Management - Healthcare System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary-color: #64748b;
            --success-color: #059669;
            --danger-color: #dc2626;
            --danger-hover: #b91c1c;
            --info-color: #0891b2;
            --background-color: #0f172a;
            --surface-color: #1e293b;
            --surface-hover: #334155;
            --border-color: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background-color);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .dashboard-container {
            min-height: 100vh;
            padding: 2rem;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* Table Container */
        .table-container {
            background: var(--surface-color);
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
        }

        .table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        
        .table tbody tr:hover {
            background: var(--surface-hover);
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        .patient-info { display: flex; align-items: center; gap: 0.75rem; }
        .patient-avatar {
            width: 2.5rem; height: 2.5rem; border-radius: 50%; background: var(--primary-color);
            display: flex; align-items: center; justify-content: center; color: white;
            font-weight: 600; font-size: 0.875rem;
        }
        .patient-details h4 { font-weight: 500; }
        .patient-id { font-size: 0.75rem; color: var(--text-muted); }
        .action-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 2rem; height: 2rem; border-radius: 0.375rem; border: none; cursor: pointer;
        }
        .delete-btn {
            background: rgba(220, 38, 38, 0.1); color: var(--danger-color);
            border: 1px solid rgba(220, 38, 38, 0.2);
        }
        .delete-btn:hover { background: rgba(220, 38, 38, 0.2); }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary); }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; color: var(--text-muted); }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--surface-color); border: 1px solid var(--border-color);
            border-radius: 1rem; padding: 2rem; width: 100%; max-width: 400px;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transform: scale(0.95); transition: transform 0.3s ease;
        }
        .modal-overlay.show .modal-content { transform: scale(1); }
        .modal-icon {
            width: 3.5rem; height: 3.5rem; border-radius: 50%; background: rgba(220, 38, 38, 0.1);
            color: var(--danger-color); display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; margin: 0 auto 1.5rem; border: 1px solid rgba(220, 38, 38, 0.2);
        }
        .modal-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
        .modal-body { color: var(--text-secondary); margin-bottom: 2rem; }
        .modal-actions { display: flex; gap: 1rem; }
        .modal-actions .btn { flex: 1; }
        .btn-danger { background: var(--danger-color); color: white; }
        .btn-danger:hover { background: var(--danger-hover); }

        /* Toast Notification Styles */
        .toast {
            position: fixed; top: 2rem; right: 2rem; background: var(--surface-color);
            border-left: 4px solid var(--success-color); border-radius: 0.5rem;
            padding: 1rem 1.5rem; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transform: translateX(120%); opacity: 0; transition: all 0.4s ease;
            z-index: 1001; display: flex; align-items: center; gap: 1rem;
        }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.success { border-left-color: var(--success-color); }
        .toast.error { border-left-color: var(--danger-color); }
        .toast-icon { font-size: 1.25rem; }
        .toast.success .toast-icon { color: var(--success-color); }
        .toast.error .toast-icon { color: var(--danger-color); }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div>
            <h1 class="page-title">Patients Management</h1>
            <p class="page-subtitle">View, edit, and manage all patients in your healthcare system</p>
        </div>

        <div class="controls">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Search patients..." id="searchInput">
            </div>
        </div>

        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>Patient</th> <th>Age</th> <th>Phone</th> <th>Email</th> <th>Gender</th> <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="patientTable"></tbody>
            </table>
        </div>
    </div>
    
    <div class="toast" id="toastNotification">
        <div class="toast-icon"><i class="fas fa-check-circle"></i></div>
        <div class="toast-content" id="toastMessage"></div>
    </div>

    <div class="modal-overlay" id="deleteModal">
        <div class="modal-content">
            <div class="modal-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <h3 class="modal-title">Confirm Deletion</h3>
            <p class="modal-body">Are you sure?</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelDelete">Cancel</button>
                <button class="btn btn-danger" id="confirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <script>
        const patientTable = document.getElementById("patientTable");
        const searchInput = document.getElementById("searchInput");

        let allPatients = [];

        async function fetchAndRenderPatients() {
            try {
                const response = await fetch('http://localhost:8080/api/patients');
                if (!response.ok) throw new Error('Failed to fetch patients.');
                allPatients = await response.json();
                renderPatients(allPatients);
            } catch (error) {
                console.error('Error fetching patients:', error);
                patientTable.innerHTML = `<tr><td colspan="6" class="empty-state"><h3>Could not load data</h3></td></tr>`;
            }
        }

        function renderPatients(patientsToRender) {
            patientTable.innerHTML = "";
            if (patientsToRender.length === 0) {
                patientTable.innerHTML = `<tr><td colspan="6" class="empty-state"><i class="fas fa-user-friends"></i><h3>No patients found</h3></td></tr>`;
                return;
            }
            patientsToRender.forEach(patient => {
                const initials = (patient.fullName || '').split(' ').map(name => name[0]).join('').substring(0, 2).toUpperCase();
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>
                        <div class="patient-info">
                            <div class="patient-avatar">${initials}</div>
                            <div class="patient-details">
                                <h4>${patient.fullName}</h4>
                                <div class="patient-id">ID: ${patient.id}</div>
                            </div>
                        </div>
                    </td>
                    <td>${patient.age}</td>
                    <td>${patient.phone}</td>
                    <td>${patient.email || 'N/A'}</td>
                    <td>${patient.gender || 'N/A'}</td>
                    <td>
                        <button class="action-btn delete-btn" onclick="deletePatient(${patient.id}, '${patient.fullName}')" title="Delete Patient">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                patientTable.appendChild(row);
            });
        }

        function filterPatients() {
            const searchTerm = searchInput.value.toLowerCase();
            const filteredPatients = allPatients.filter(p => 
                p.fullName.toLowerCase().includes(searchTerm) || p.phone.includes(searchTerm)
            );
            renderPatients(filteredPatients);
        }

        // NEW FUNCTION to show a toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toastNotification');
            const icon = toast.querySelector('.toast-icon');
            const messageEl = document.getElementById('toastMessage');

            messageEl.textContent = message;
            toast.className = `toast ${type}`; // e.g., 'toast success'
            icon.innerHTML = type === 'success' ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-exclamation-circle"></i>';
            
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        async function deletePatient(patientId, patientName) {
            const modal = document.getElementById('deleteModal');
            const confirmBtn = document.getElementById('confirmDelete');
            const cancelBtn = document.getElementById('cancelDelete');
            modal.querySelector('.modal-body').textContent = `Are you sure you want to delete ${patientName}?`;
            modal.classList.add('show');

            const userConfirmed = await new Promise(resolve => {
                confirmBtn.onclick = () => resolve(true);
                cancelBtn.onclick = () => resolve(false);
            });

            modal.classList.remove('show');

            if (userConfirmed) {
                try {
                    const response = await fetch(`http://localhost:8080/api/patients/${patientId}`, { method: 'DELETE' });
                    if (!response.ok) throw new Error('Failed to delete patient.');
                    
                    // THIS IS THE CHANGE: Use showToast instead of alert
                    showToast(`${patientName} has been successfully deleted.`, 'success');
                    
                    fetchAndRenderPatients(); 
                } catch (error) {
                    console.error('Error deleting patient:', error);
                    showToast(error.message, 'error');
                }
            }
        }

        searchInput.addEventListener('input', filterPatients);
        document.addEventListener('DOMContentLoaded', fetchAndRenderPatients);
    </script>
</body>
</html>
