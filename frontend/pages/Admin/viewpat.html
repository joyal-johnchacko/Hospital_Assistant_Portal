<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients Management - Healthcare System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --background-color: #0f172a;
            --surface-color: #1e293b;
            --surface-hover: #334155;
            --border-color: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--background-color); color: var(--text-primary); line-height: 1.6; }
        .dashboard-container { min-height: 100vh; padding: 2rem; }
        .header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-start; }
        .header-content { flex: 1; }
        .page-title { font-size: 2.5rem; font-weight: 700; color: var(--primary-color); margin-bottom: 0.5rem; }
        .page-subtitle { color: var(--text-secondary); font-size: 1rem; margin-bottom: 2rem; }
        .back-button {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .back-button:hover {
            background: var(--surface-hover);
            border-color: var(--primary-color);
        }
        .stat-card {
            background: var(--surface-color); border: 1px solid var(--border-color);
            border-radius: 1rem; padding: 1.5rem; margin-bottom: 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .stat-card-value { font-size: 2rem; font-weight: 700; color: var(--text-primary); }
        .stat-card-title { font-size: 0.875rem; color: var(--text-secondary); }
        .stat-card-icon { font-size: 1.5rem; color: var(--primary-color); background: rgba(37, 99, 235, 0.1); padding: 0.75rem; border-radius: 0.5rem;}
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; gap: 1rem; }
        .search-container { position: relative; flex: 1; max-width: 400px; }
        .search-input { width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 0.5rem; color: var(--text-primary); }
        .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .table-container { background: var(--surface-color); border-radius: 1rem; border: 1px solid var(--border-color); overflow: hidden; }
        .table { width: 100%; border-collapse: collapse; }
        .table th { padding: 1rem; text-align: left; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; border-bottom: 1px solid var(--border-color); }
        .table td { padding: 1rem; border-bottom: 1px solid var(--border-color); }
        .table tbody tr:hover { background: var(--surface-hover); }
        .patient-info { display: flex; align-items: center; gap: 0.75rem; }
        .patient-avatar { width: 2.5rem; height: 2.5rem; border-radius: 50%; background: var(--primary-color); display: flex; align-items: center; justify-content: center; font-weight: 600; }
        .patient-id { font-size: 0.75rem; color: var(--text-muted); }
        .empty-state { text-align: center; padding: 3rem; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <div class="header-content">
                <h1 class="page-title">Patients Management</h1>
                <p class="page-subtitle">View all patients in your healthcare system</p>
            </div>
            <a href="users.html" class="back-button">
                <i class="fas fa-arrow-left"></i>
                Back
            </a>
        </div>

        <div class="stat-card">
            <div>
                <div class="stat-card-title">Total Patients</div>
                <div class="stat-card-value" id="totalPatients">0</div>
            </div>
            <div class="stat-card-icon"><i class="fas fa-users"></i></div>
        </div>
        
        <div class="controls">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Search patients..." id="searchInput">
            </div>
        </div>

        <div class="table-container">
            <table class="table">
                <thead>
                    <tr><th>Patient</th><th>Age</th><th>Phone</th><th>Email</th><th>Gender</th></tr>
                </thead>
                <tbody id="patientTable"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        const patientTable = document.getElementById("patientTable");
        const searchInput = document.getElementById("searchInput");
        const totalPatientsEl = document.getElementById("totalPatients");
        let allPatients = [];

        async function fetchAndRenderPatients() {
            try {
                const response = await fetch('http://localhost:8080/api/patients');
                if (!response.ok) throw new Error('Failed to fetch patients.');
                allPatients = await response.json();
                
                totalPatientsEl.textContent = allPatients.length;
                renderPatients(allPatients);
            } catch (error) {
                console.error('Error fetching patients:', error);
                patientTable.innerHTML = `<tr><td colspan="5" class="empty-state"><h3>Could not load data</h3></td></tr>`;
            }
        }

        function renderPatients(patientsToRender) {
            patientTable.innerHTML = "";
            if (patientsToRender.length === 0) {
                patientTable.innerHTML = `<tr><td colspan="5" class="empty-state"><i class="fas fa-user-friends"></i><h3>No patients found</h3></td></tr>`;
                return;
            }
            patientsToRender.forEach(patient => {
                const initials = (patient.fullName || '').split(' ').map(name => name[0]).join('').substring(0, 2).toUpperCase();
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>
                        <div class="patient-info">
                            <div class="patient-avatar">${initials}</div>
                            <div><h4>${patient.fullName}</h4><div class="patient-id">ID: ${patient.id}</div></div>
                        </div>
                    </td>
                    <td>${patient.age}</td>
                    <td>${patient.phone}</td>
                    <td>${patient.email || 'N/A'}</td>
                    <td>${patient.gender || 'N/A'}</td>
                `;
                patientTable.appendChild(row);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allPatients.filter(patient => 
                patient.fullName.toLowerCase().includes(searchTerm) ||
                patient.email?.toLowerCase().includes(searchTerm) ||
                patient.phone.includes(searchTerm)
            );
            renderPatients(filtered);
        });
        
        document.addEventListener('DOMContentLoaded', fetchAndRenderPatients);
    </script>
</body>
</html>
