<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Healthcare Management System</title>
  <meta name="description" content="Admin dashboard for healthcare management system">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --secondary-color: #64748b;
      --danger-color: #dc2626;
      --danger-hover: #b91c1c;
      --success-color: #059669;
      --warning-color: #d97706;
      --background-primary: #0f172a;
      --background-secondary: #1e293b;
      --background-card: rgba(30, 41, 59, 0.8);
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --border-color: rgba(148, 163, 184, 0.2);
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Animated background particles */
    .background-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 20s infinite linear;
    }

    .particle:nth-child(1) { width: 80px; height: 80px; top: 10%; left: 10%; animation-delay: 0s; }
    .particle:nth-child(2) { width: 60px; height: 60px; top: 70%; left: 80%; animation-delay: -5s; }
    .particle:nth-child(3) { width: 100px; height: 100px; top: 40%; left: 70%; animation-delay: -10s; }
    .particle:nth-child(4) { width: 40px; height: 40px; top: 80%; left: 20%; animation-delay: -15s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
      25% { transform: translateY(-20px) rotate(90deg); opacity: 0.6; }
      50% { transform: translateY(-40px) rotate(180deg); opacity: 0.3; }
      75% { transform: translateY(-20px) rotate(270deg); opacity: 0.6; }
    }

    /* Main dashboard container */
    .dashboard-container {
      background: var(--background-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      padding: 2.5rem;
      width: 100%;
      max-width: 28rem;
      position: relative;
      z-index: 10;
    }

    /* Header section */
    .dashboard-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .dashboard-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--primary-color), #3b82f6);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .dashboard-subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Stats cards */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: rgba(100, 116, 139, 0.1);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      background: rgba(100, 116, 139, 0.15);
      transform: translateY(-2px);
    }

    .stat-number {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 0.25rem;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Action buttons */
    .actions-grid {
      display: grid;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      border: none;
      border-radius: var(--radius-lg);
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .action-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s ease;
    }

    .action-btn:hover::before {
      left: 100%;
    }

    .action-btn.primary {
      background: linear-gradient(135deg, var(--primary-color), #3b82f6);
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    }

    .action-btn.primary:hover {
      background: linear-gradient(135deg, var(--primary-hover), var(--primary-color));
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
      transform: translateY(-2px);
    }

    .action-btn.secondary {
      background: linear-gradient(135deg, var(--secondary-color), #475569);
      box-shadow: 0 4px 15px rgba(100, 116, 139, 0.3);
    }

    .action-btn.secondary:hover {
      background: linear-gradient(135deg, #475569, var(--secondary-color));
      box-shadow: 0 6px 20px rgba(100, 116, 139, 0.4);
      transform: translateY(-2px);
    }

    .action-btn.danger {
      background: linear-gradient(135deg, var(--danger-color), #ef4444);
      box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
    }

    .action-btn.danger:hover {
      background: linear-gradient(135deg, var(--danger-hover), var(--danger-color));
      box-shadow: 0 6px 20px rgba(220, 38, 38, 0.4);
      transform: translateY(-2px);
    }

    .action-btn i {
      font-size: 1.1rem;
    }

    /* Footer */
    .dashboard-footer {
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-color);
      text-align: center;
    }

    .footer-text {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .footer-link {
      color: var(--primary-color);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer-link:hover {
      color: var(--primary-hover);
    }

    /* Loading states */
    .loading {
      position: relative;
      pointer-events: none;
    }

    .loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 1rem;
      height: 1rem;
      margin: -0.5rem 0 0 -0.5rem;
      border: 2px solid transparent;
      border-top: 2px solid currentColor;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive design */
    @media (max-width: 768px) {
      .dashboard-container {
        padding: 2rem 1.5rem;
        max-width: 100%;
      }

      .dashboard-title {
        font-size: 1.75rem;
      }

      .stats-grid {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }

      .action-btn {
        padding: 0.875rem 1.25rem;
        font-size: 0.9rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 0.5rem;
      }

      .dashboard-container {
        padding: 1.5rem 1rem;
      }

      .dashboard-title {
        font-size: 1.5rem;
      }

      .action-btn {
        padding: 0.75rem 1rem;
      }
    }

    /* Focus states for accessibility */
    .action-btn:focus,
    .footer-link:focus {
      outline: 2px solid var(--primary-color);
      outline-offset: 2px;
    }

    /* High contrast mode support */
    @media (prefers-contrast: high) {
      :root {
        --background-card: rgba(0, 0, 0, 0.9);
        --border-color: rgba(255, 255, 255, 0.5);
      }
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <!-- Animated background -->
  <div class="background-animation">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Main dashboard -->
  <main class="dashboard-container" role="main">
    <!-- Header -->
    <header class="dashboard-header">
      <h1 class="dashboard-title">Admin Dashboard</h1>
      <p class="dashboard-subtitle">Healthcare Management System</p>
    </header>

    <!-- Quick stats -->
    <section class="stats-grid" aria-label="Quick statistics">
      <div class="stat-card">
        <div class="stat-number" id="userCount">---</div>
        <div class="stat-label">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="appointmentCount">---</div>
        <div class="stat-label">Appointments</div>
      </div>
    </section>

    <!-- Action buttons -->
    <nav class="actions-grid" role="navigation" aria-label="Main actions">
      <a href="users.html" class="action-btn primary" aria-describedby="users-desc">
        <i class="fas fa-users" aria-hidden="true"></i>
        <span>Manage Users</span>
      </a>  
      <a href="../Login/frontpage.html" class="action-btn danger" aria-describedby="logout-desc">
        <i class="fas fa-sign-out-alt" aria-hidden="true"></i>
        <span>Logout</span>
      </a>
    </nav>

    <!-- Footer -->
    <footer class="dashboard-footer">
      <p class="footer-text">
        © 2025 Healthcare Management System. 
        <a href="#" class="footer-link">Support</a> | 
        <a href="#" class="footer-link">Documentation</a>
      </p>
    </footer>
  </main>

  <!-- Hidden descriptions for screen readers -->
  <div id="users-desc" class="sr-only">View and manage all registered users in the system</div>
  <div id="appointments-desc" class="sr-only">View and manage all appointments and schedules</div>
  <div id="logout-desc" class="sr-only">Sign out of the admin dashboard</div>

  <script>
    // Simulate loading stats
    document.addEventListener('DOMContentLoaded', function() {
      // Animate counters
      function animateCounter(element, target) {
        let current = 0;
        const increment = target / 50;
        const timer = setInterval(() => {
          current += increment;
          if (current >= target) {
            element.textContent = target.toLocaleString();
            clearInterval(timer);
          } else {
            element.textContent = Math.floor(current).toLocaleString();
          }
        }, 30);
      }

      // Simulate API calls for stats
      setTimeout(() => {
        animateCounter(document.getElementById('userCount'), 1247);
        animateCounter(document.getElementById('appointmentCount'), 89);
      }, 500);

      // Add loading states to buttons
      const buttons = document.querySelectorAll('.action-btn');
      buttons.forEach(button => {
        button.addEventListener('click', function(e) {
          // Only for demonstration - remove in production
          if (this.classList.contains('primary') || this.classList.contains('secondary')) {
            e.preventDefault();
            this.classList.add('loading');
            setTimeout(() => {
              this.classList.remove('loading');
              // Redirect would happen here
              window.location.href = this.href;
            }, 1000);
          }
        });
      });

      // Keyboard navigation enhancement
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          const activeElement = document.activeElement;
          if (activeElement && activeElement.classList.contains('action-btn')) {
            activeElement.blur();
          }
        }
      });
    });

    // Error handling for failed navigation
    window.addEventListener('error', function(e) {
      console.error('Navigation error:', e);
      // Could show user-friendly error message here
    });
  </script>

  <!-- Screen reader only class -->
  <style>
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</body>
</html>
