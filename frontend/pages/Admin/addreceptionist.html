<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Receptionist - Healthcare Management System</title>
    <meta name="description" content="Add a new receptionist to the healthcare management system">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary-color: #64748b;
            --secondary-hover: #475569;
            --success-color: #059669;
            --success-hover: #047857;
            --danger-color: #dc2626;
            --danger-hover: #b91c1c;
            --warning-color: #d97706;
            --info-color: #0891b2;
            --background-color: #0f172a;
            --surface-color: #1e293b;
            --surface-hover: #334155;
            --border-color: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background-color);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .dashboard-container {
            min-height: 100vh;
            padding: 2rem;
        }

        /* Header */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .breadcrumb a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.2s;
        }

        .breadcrumb a:hover {
            color: var(--primary-hover);
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 0;
        }

        /* Form Container */
        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            overflow: hidden;
        }

        .form-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, var(--surface-color) 0%, var(--surface-hover) 100%);
        }

        .form-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .form-header p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .form-body {
            padding: 2rem;
        }

        /* Form Sections */
        .form-section {
            margin-bottom: 2rem;
        }

        .form-section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border-color);
        }

        .section-icon {
            width: 1.5rem;
            height: 1.5rem;
            color: var(--primary-color);
        }

        /* Form Grid */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        /* Form Groups */
        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .required {
            color: var(--danger-color);
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--background-color);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .form-input::placeholder {
            color: var(--text-muted);
        }

        /* Input Icons */
        .input-group {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .input-group .form-input {
            padding-left: 2.5rem;
        }

        /* Radio Group */
        .radio-group {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
            height: 100%;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .radio-input {
            width: 1rem;
            height: 1rem;
            accent-color: var(--primary-color);
        }

        .radio-label {
            font-size: 0.875rem;
            color: var(--text-primary);
            cursor: pointer;
        }

        /* Form Actions */
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
            margin-top: 2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--surface-hover);
            color: var(--text-primary);
            border-color: var(--text-muted);
        }

        /* Success/Error Message */
        .message-box {
            display: none;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .message-box.success {
             background: rgba(5, 150, 105, 0.1);
            border: 1px solid rgba(5, 150, 105, 0.2);
            color: var(--success-color);
        }

        .message-box.error {
             background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.2);
            color: var(--danger-color);
        }

        .message-box.show {
            display: block;
        }


        /* Error Styles */
        .form-input.error,
        .form-select.error {
            border-color: var(--danger-color);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-container {
                padding: 1rem;
            }

            .page-title {
                font-size: 2rem;
            }

            .form-container {
                margin: 0;
            }

            .form-header,
            .form-body {
                padding: 1.5rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .radio-group {
                flex-direction: row;
            }

            .form-actions {
                flex-direction: column-reverse;
            }
        }

        @media (max-width: 480px) {
            .form-header,
            .form-body {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <nav class="breadcrumb">
            <a href="admin-dashboard.html">Admin Dashboard</a>
            <span>/</span>
            <a href="users.html">User Management</a>
            <span>/</span>
            <a href="receptionistlist.html">Receptionists</a>
            <span>/</span>
            <span>Add Receptionist</span>
        </nav>

        <div class="page-header">
            <h1 class="page-title">Add New Receptionist</h1>
            <p class="page-subtitle">Enter the receptionist's information to add them to your healthcare system</p>
        </div>

        <div class="form-container">
            <div class="form-header">
                <h2>
                    <i class="fas fa-user-plus"></i>
                    Receptionist Registration
                </h2>
                <p>Please fill in all required information to register a new receptionist</p>
            </div>

            <form class="form-body" id="receptionistForm">
                <div class="message-box" id="messageBox"></div>

                <div class="form-section">
                    <h3 class="section-title">
                        <i class="fas fa-user-check section-icon"></i>
                        Receptionist Details
                    </h3>
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="fullName">
                                Full Name <span class="required">*</span>
                            </label>
                            <div class="input-group">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" id="fullName" class="form-input" placeholder="Enter full name" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="age">
                                Age <span class="required">*</span>
                            </label>
                            <div class="input-group">
                                <i class="fas fa-hashtag input-icon"></i>
                                <input type="number" id="age" class="form-input" placeholder="Enter age" min="18" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">
                                Gender <span class="required">*</span>
                            </label>
                            <div class="radio-group">
                                <div class="radio-item">
                                    <input type="radio" id="male" name="gender" value="Male" class="radio-input" required>
                                    <label for="male" class="radio-label">Male</label>
                                </div>
                                <div class="radio-item">
                                    <input type="radio" id="female" name="gender" value="Female" class="radio-input" required>
                                    <label for="female" class="radio-label">Female</label>
                                </div>
                                <div class="radio-item">
                                    <input type="radio" id="other" name="gender" value="Other" class="radio-input" required>
                                    <label for="other" class="radio-label">Other</label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="phone">
                                Phone Number <span class="required">*</span>
                            </label>
                            <div class="input-group">
                                <i class="fas fa-phone input-icon"></i>
                                <input type="tel" id="phone" class="form-input" placeholder="(555) 123-4567" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="email">
                                Email Address <span class="required">*</span>
                            </label>
                            <div class="input-group">
                                <i class="fas fa-envelope input-icon"></i>
                                <input type="email" id="email" class="form-input" placeholder="email@example.com" required>
                            </div>
                        </div>
                        
                         <!-- The experience field is removed as it's not in the backend model -->
                    </div>
                </div>

                <div class="form-actions">
                    <a href="receptionistlist.html" class="btn btn-secondary">
                        <i class="fas fa-times"></i>
                        Cancel
                    </a>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i class="fas fa-user-plus"></i>
                        Add Receptionist
                    </button>
                </div>
            </form>
        </div>
    </div>

<script>
    document.getElementById('receptionistForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const messageBox = document.getElementById('messageBox');
        
        // Disable button to prevent multiple submissions
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Adding...';

        // Clear previous messages
        messageBox.className = 'message-box';
        messageBox.textContent = '';

        // Validate required fields
        const requiredFields = ['fullName', 'age', 'phone', 'email'];
        let isValid = true;
        
        requiredFields.forEach(fieldId => {
            const element = document.getElementById(fieldId);
            if (!element.value.trim()) {
                element.classList.add('error');
                isValid = false;
            } else {
                element.classList.remove('error');
            }
        });

        const genderSelected = document.querySelector('input[name="gender"]:checked');
        if (!genderSelected) {
            isValid = false;
            // You can add a visual error indicator for the radio group here
        }

        if (!isValid) {
             submitBtn.disabled = false;
             submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Add Receptionist';
             return;
        }

        // Collect form data
        const formData = {
            fullName: document.getElementById('fullName').value,
            age: parseInt(document.getElementById('age').value, 10),
            gender: genderSelected.value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value
        };

        try {
            // Send data to the backend API
            const response = await fetch('http://localhost:8080/api/receptionists/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });

            const responseText = await response.text();

            if (response.ok) {
                // Handle success
                messageBox.textContent = 'Receptionist added successfully!';
                messageBox.className = 'message-box success show';
                
                document.getElementById('receptionistForm').reset();

                // Redirect after a short delay
                setTimeout(() => {
                    window.location.href = "receptionistlist.html"; 
                }, 2000);

            } else {
                // Handle errors (e.g., email already exists)
                messageBox.textContent = responseText || 'An error occurred.';
                messageBox.className = 'message-box error show';
            }
        } catch (error) {
            // Handle network or other unexpected errors
            console.error('Error:', error);
            messageBox.textContent = 'Could not connect to the server. Please try again later.';
            messageBox.className = 'message-box error show';
        } finally {
            // Re-enable the button
             submitBtn.disabled = false;
             submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Add Receptionist';
        }
    });

    // Remove error styling on input
    document.querySelectorAll('.form-input').forEach(element => {
        element.addEventListener('input', function() {
            this.classList.remove('error');
        });
    });
</script>

</body>
</html>
