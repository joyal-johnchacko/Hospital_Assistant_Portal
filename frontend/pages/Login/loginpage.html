<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Login | Hospital Assistant Portal</title>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
 <style>
     * { margin: 0; padding: 0; box-sizing: border-box; }
     :root {
         --primary: #0066CC; --primary-dark: #0052A3; --secondary: #00B4D8;
         --accent: #7C3AED; --success: #10B981; --error: #EF4444;
         --background: #0A0E1A; --surface: rgba(255, 255, 255, 0.05);
         --surface-hover: rgba(255, 255, 255, 0.1); --text-primary: #FFFFFF;
         --text-secondary: rgba(255, 255, 255, 0.7); --text-muted: rgba(255, 255, 255, 0.5);
         --border: rgba(255, 255, 255, 0.1); --glow: rgba(0, 102, 204, 0.3);
         --input-bg: rgba(255, 255, 255, 0.08); --input-border: rgba(255, 255, 255, 0.15);
     }
     body {
         font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
         background: var(--background);
         background-image:
             radial-gradient(circle at 20% 30%, rgba(0, 102, 204, 0.1) 0%, transparent 50%),
             radial-gradient(circle at 80% 70%, rgba(124, 58, 237, 0.08) 0%, transparent 50%);
         min-height: 100vh; display: flex; align-items: center; justify-content: center;
         padding: 20px; color: var(--text-primary); overflow-x: hidden;
     }
     .container { width: 100%; max-width: 420px; position: relative; z-index: 1; }
     .login-container {
         background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--border);
         border-radius: 24px; padding: 40px; position: relative; z-index: 1;
         box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
     }
     .header { text-align: center; margin-bottom: 32px; }
     .logo {
         width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary), var(--secondary));
         border-radius: 16px; margin: 0 auto 20px; display: flex; align-items: center;
         justify-content: center; font-size: 24px; font-weight: 700; color: white;
         box-shadow: 0 8px 24px rgba(0, 102, 204, 0.3);
     }
     .login-title {
         font-size: 2rem; font-weight: 700; margin-bottom: 8px;
         background: linear-gradient(135deg, var(--text-primary) 0%, var(--secondary) 100%);
         -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
     }
     .login-subtitle { color: var(--text-secondary); font-size: 0.95rem; font-weight: 400; }
     .form-group { margin-bottom: 24px; }
     .form-label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 500; color: var(--text-primary); }
     .form-input, .form-select {
         width: 100%; padding: 16px; background: var(--input-bg); border: 1px solid var(--input-border);
         border-radius: 12px; font-size: 1rem; color: var(--text-primary); font-family: inherit;
         transition: all 0.3s ease; outline: none; backdrop-filter: blur(10px);
     }
     .form-input:focus, .form-select:focus {
         border-color: var(--primary); background: rgba(255, 255, 255, 0.12);
         box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.2);
     }
     .form-select option {
         background: var(--background);
         color: var(--text-primary);
     }
     .login-button {
         width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
         border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600;
         cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 20px rgba(0, 102, 204, 0.3);
     }
     .login-button:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0, 102, 204, 0.4); }
     .signup-link { text-align: center; margin-top: 24px; }
     .signup-link a { color: var(--secondary); text-decoration: none; font-weight: 600; }
     .error-message { color: var(--error); font-size: 0.8rem; margin-top: 6px; text-align: center; display: none; }
 </style>
</head>
<body>
  <div class="container">
    <div class="login-container">
      <div class="header">
        <div class="logo">H+</div>
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to access your dashboard</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="username" class="form-label">Full Name</label>
          <input type="text" id="username" name="username" class="form-input" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
        </div>
        <div class="form-group">
          <label for="role" class="form-label">Role</label>
          <select id="role" name="role" class="form-select" required>
            <option value="">Select your role</option>
            <option value="patient">Patient</option>
            <option value="doctor">Doctor</option>
            <option value="receptionist">Receptionist</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div id="errorMessage" class="error-message">Invalid credentials. Please try again.</div>
        <button type="submit" class="login-button">Sign In</button>
      </form>
      <div class="signup-link">
        <p>Don't have an account? <a href="signuppage.html">Create a new account</a></p>
      </div>
    </div>
  </div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const role = document.getElementById('role').value;
        const errorMessage = document.getElementById('errorMessage');
        errorMessage.style.display = 'none';
        
        const loginData = {
            fullName: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        if (role === 'patient') {
            fetch('http://localhost:8080/api/patients/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(loginData),
            })
            .then(response => {
                if (response.ok) return response.json();
                throw new Error('Login failed.');
            })
            .then(patientData => {
                sessionStorage.setItem('loggedInPatient', JSON.stringify(patientData));
                window.location.href = '../Patient/dashboard.html';
            })
            .catch(error => {
                console.error("Patient login error:", error);
                errorMessage.style.display = 'block';
            });

        } else if (role === 'doctor') {
            fetch('http://localhost:8080/api/doctors/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(loginData),
            })
            .then(response => {
                if (response.ok) return response.json();
                throw new Error('Login failed.');
            })
            .then(doctorData => {
                sessionStorage.setItem('loggedInDoctor', JSON.stringify(doctorData));
                window.location.href = '../Doctor/doc_dashboard.html'; 
            })
            .catch(error => {
                console.error("Doctor login error:", error);
                errorMessage.style.display = 'block';
            });
        
        } else if (role === 'receptionist') {
            fetch('http://localhost:8080/api/receptionists/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(loginData),
            })
            .then(response => {
                if (response.ok) return response.json();
                throw new Error('Login failed.');
            })
            .then(receptionistData => {
                sessionStorage.setItem('loggedInReceptionist', JSON.stringify(receptionistData));
                window.location.href = '../Receptionist/index.html'; 
            })
            .catch(error => {
                console.error("Receptionist login error:", error);
                errorMessage.style.display = 'block';
            });

        } else if (role === 'admin') {
            fetch('http://localhost:8080/api/admins/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(loginData),
            })
            .then(response => {
                if (response.ok) return response.json();
                throw new Error('Login failed.');
            })
            .then(adminData => {
                sessionStorage.setItem('loggedInAdmin', JSON.stringify(adminData));
                window.location.href = '../Admin/admin.html'; 
            })
            .catch(error => {
                console.error("Admin login error:", error);
                errorMessage.style.display = 'block';
            });

        } else {
             errorMessage.textContent = 'Please select a valid role.';
             errorMessage.style.display = 'block';
        }
    });
</script>
</body>
</html>
