<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Welcome | Hospital Assistant Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/style.css">
  <title>Welcome | Hospital Assistant Portal</title>
</head>
<body>
  <div class="floating-elements">
    <div class="floating-circle"></div>
    <div class="floating-circle"></div>
    <div class="floating-circle"></div>
  </div>

  <div class="container">
    <div class="glow-effect"></div>
    <div class="welcome-card">
      <div class="logo">H+</div>
      <h1 class="title">Hospital Assistant Portal</h1>
      <p class="subtitle">Streamline your healthcare workflow with intelligent assistance and seamless patient management.</p>
      
      <div class="button-group">
        <button class="btn btn-primary" onclick="location.href='loginpage.html'">
          <span>Login to Account</span>
        </button>
        <button class="btn btn-secondary" onclick="location.href='signuppage.html'">
          <span>Create New Account</span>
        </button>
      </div>

    </div>
  </div>

  <script>
    // Add subtle interactive effects
    document.addEventListener('mousemove', (e) => {
      const cards = document.querySelectorAll('.welcome-card');
      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;
      
      cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const cardX = (rect.left + rect.width / 2) / window.innerWidth;
        const cardY = (rect.top + rect.height / 2) / window.innerHeight;
        
        const deltaX = (x - cardX) * 10;
        const deltaY = (y - cardY) * 10;
        
        card.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
      });
    });

    // Add click ripple effect
    document.querySelectorAll('.btn').forEach(button => {
      button.addEventListener('click', function(e) {
        const ripple = document.createElement('div');
        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        const x = e.clientX - rect.left - size / 2;
        const y = e.clientY - rect.top - size / 2;
        
        ripple.style.cssText = `
          position: absolute;
          width: ${size}px;
          height: ${size}px;
          left: ${x}px;
          top: ${y}px;
          background: rgba(255, 255, 255, 0.3);
          border-radius: 50%;
          transform: scale(0);
          animation: ripple 0.6s ease-out;
          pointer-events: none;
        `;
        
        this.appendChild(ripple);
        
        setTimeout(() => ripple.remove(), 600);
      });
    });

    // Add CSS for ripple animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes ripple {
        to {
          transform: scale(2);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
