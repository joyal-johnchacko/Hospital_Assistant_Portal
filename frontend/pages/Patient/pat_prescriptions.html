<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Prescriptions | ABC Hospital</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #1a1f2e 0%, #2c3447 100%);
      color: #e2e8f0;
      min-height: 100vh;
      line-height: 1.6;
    }
    .navbar {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      border-bottom: 1px solid rgba(51, 65, 85, 0.3);
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
    }
    .navbar .logo { font-size: 1.5rem; font-weight: 700; color: #60a5fa; }
    .btn-back {
      color: #94a3b8; text-decoration: none; padding: 0.5rem 1rem; border-radius: 8px;
      transition: all 0.3s ease; background: rgba(51, 65, 85, 0.3); border: 1px solid rgba(51, 65, 85, 0.5);
    }
    .btn-back:hover { background: rgba(51, 65, 85, 0.5); color: #e2e8f0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem;}
    .page-header { text-align: center; margin-bottom: 2rem; }
    .page-header h1 { font-size: 2.5rem; font-weight: 700; color: #60a5fa; margin-bottom: 0.5rem; }
    .patient-info-card {
      background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px);
      border-radius: 16px; padding: 2rem; margin-bottom: 2rem;
      border: 1px solid rgba(51, 65, 85, 0.3); display: flex;
      justify-content: space-between; align-items: center;
    }
    .patient-details { display: flex; align-items: center; gap: 1.5rem;}
    .patient-avatar { font-size: 4rem; color: #60a5fa;}
    .patient-data h3 { font-size: 1.5rem; margin-bottom: 0.5rem;}
    .patient-data p { color: #94a3b8; display: flex; align-items: center; gap: 0.5rem;}
    .patient-data i { color: #60a5fa; width: 16px;}
    .prescriptions-container { display: flex; flex-direction: column; gap: 2rem; margin-bottom: 2rem;}
    .prescription-card {
      background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); border-radius: 16px;
      border: 1px solid rgba(51, 65, 85, 0.3); overflow: hidden;
    }
    .prescription-header {
      padding: 1.5rem 2rem; background: rgba(51, 65, 85, 0.2);
      border-bottom: 1px solid rgba(51, 65, 85, 0.3); display: flex;
      justify-content: space-between; align-items: center;
    }
    .doctor-info { display: flex; align-items: center; gap: 1rem;}
    .doctor-avatar { font-size: 2.5rem; color: #60a5fa;}
    .doctor-details h3 { font-size: 1.3rem; margin-bottom: 0.25rem;}
    .doctor-details p { font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; }
    .prescription-content { padding: 2rem;}
    .medicines-table { background: rgba(15, 23, 42, 0.5); border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem;}
    .medicines-table table { width: 100%; border-collapse: collapse;}
    .medicines-table th { background: rgba(51,65,85,0.5); padding: 1rem; text-align: left; }
    .medicines-table td { padding: 1rem; border-bottom: 1px solid rgba(51,65,85,0.2); }
    .medicines-table tr:last-child td { border-bottom: none;}
    .prescription-notes { background: rgba(51,65,85,0.3); border-radius: 12px; padding: 1.5rem; border-left: 4px solid #fbbf24; }
    .empty-state { padding: 4rem 2rem; text-align: center; background: rgba(30, 41, 59, 0.8); border-radius: 16px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">🏥 ABC Hospital</div>
    <ul class="nav-links">
      <li><a href="dashboard.html" class="btn-back">← Back to Dashboard</a></li>
    </ul>
  </nav>
  <main class="container">
    <div class="page-header">
      <h1><i class="fas fa-pills"></i> Medical Prescriptions</h1>
      <p>View all prescribed medications and treatment plans</p>
    </div>
    <div class="patient-info-card">
      <div class="patient-details">
        <div class="patient-avatar"><i class="fas fa-user-circle"></i></div>
        <div class="patient-data">
          <h3 id="patientFullName">Patient Name</h3>
          <p><i class="fas fa-calendar"></i> Patient ID: <span id="patientId">...</span></p>
          <p><i class="fas fa-birthday-cake"></i> Age: <span id="patientAge">...</span> | Gender: <span id="patientGender">...</span></p>
        </div>
      </div>
    </div>
    <div class="prescriptions-container" id="prescriptionsContainer">
      </div>
  </main>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const patientDataString = sessionStorage.getItem('loggedInPatient');
        if (!patientDataString) {
            alert('You must be logged in to view this page.');
            window.location.href = '../Login/loginpage.html';
            return;
        }
        const patientData = JSON.parse(patientDataString);

        document.getElementById('patientFullName').textContent = patientData.fullName;
        document.getElementById('patientId').textContent = `P-${patientData.id}`;
        document.getElementById('patientAge').textContent = patientData.age;
        document.getElementById('patientGender').textContent = patientData.gender;

        const prescriptionsContainer = document.getElementById('prescriptionsContainer');

        try {
            // --- THIS IS THE NEW LOGIC ---
            
            // Step 1: Fetch all doctors first to create a name lookup map
            const doctorsResponse = await fetch('http://localhost:8080/api/doctors');
            if (!doctorsResponse.ok) throw new Error('Could not fetch doctors list.');
            const doctors = await doctorsResponse.json();
            const doctorNameMap = new Map(doctors.map(doc => [doc.id, doc.fullName]));

            // Step 2: Fetch the prescriptions for the patient
            const prescriptionsResponse = await fetch(`http://localhost:8080/api/prescriptions/patient/${patientData.id}`);
            if (!prescriptionsResponse.ok) throw new Error('Could not fetch prescriptions.');
            const prescriptions = await prescriptionsResponse.json();

            // Step 3: Render the prescriptions, now with the doctor names
            if (prescriptions.length === 0) {
                prescriptionsContainer.innerHTML = `<div class="empty-state"><h3>No Prescriptions Found</h3><p>You do not have any prescriptions on file.</p></div>`;
                return;
            }

            prescriptionsContainer.innerHTML = '';
            prescriptions.forEach(prescription => {
                const prescDate = new Date(prescription.prescriptionDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                
                // Use the map to find the doctor's name by their ID
                const doctorName = doctorNameMap.get(prescription.doctorId) || `Doctor ID: ${prescription.doctorId}`;

                let medicinesHtml = '';
                if (prescription.medicines && prescription.medicines.length > 0) {
                    prescription.medicines.forEach(med => {
                        medicinesHtml += `
                            <tr>
                                <td><strong>${med.name}</strong> (${med.dose})</td>
                                <td>${med.timesPerDay}/day</td>
                                <td>${med.durationDays} days</td>
                            </tr>
                        `;
                    });
                }

                const cardHtml = `
                    <div class="prescription-card">
                        <div class="prescription-header">
                            <div class="doctor-info">
                                <div class="doctor-avatar"><i class="fas fa-user-md"></i></div>
                                <div class="doctor-details">
                                    <h3>Prescription from ${doctorName}</h3>
                                    <p><i class="fas fa-calendar-alt"></i> Prescribed on: ${prescDate}</p>
                                </div>
                            </div>
                        </div>
                        <div class="prescription-content">
                            <div class="medicines-table">
                                <table>
                                    <thead>
                                        <tr><th>Medicine & Dose</th><th>Frequency</th><th>Duration</th></tr>
                                    </thead>
                                    <tbody>${medicinesHtml}</tbody>
                                </table>
                            </div>
                            <div class="prescription-notes">
                                <h5><i class="fas fa-sticky-note"></i> Diagnosis & Advice</h5>
                                <p><strong>Diagnosis:</strong> ${prescription.diagnosis || 'N/A'}</p>
                                <p><strong>Advice:</strong> ${prescription.advice || 'N/A'}</p>
                            </div>
                        </div>
                    </div>
                `;
                prescriptionsContainer.innerHTML += cardHtml;
            });

        } catch (error) {
            console.error('Error:', error);
            prescriptionsContainer.innerHTML = `<div class="empty-state"><h3>Error</h3><p>Could not load your prescription data.</p></div>`;
        }
    });
</script>

</body>
</html>
