<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Appointment | ABC Hospital</title>
  <link rel="stylesheet" href="styleforcreateapp.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="page-create-appointment">

  <nav class="navbar">
    <div class="logo">🏥 Hospital Portal</div>
    <ul class="nav-links">
      <li><a href="dashboard.html" class="btn-back">← Back to Dashboard</a></li>
    </ul>
  </nav>

  <main class="container">
    <div class="appointment-card">
      <div class="card-header">
        <h2><i class="fas fa-calendar-plus"></i> Create Appointment</h2>
        <p>Schedule a new appointment for your consultation</p>
      </div>

      <form id="appointmentForm">
        <div class="form-grid">
          
          <div class="input-group">
            <label for="patientName">Patient Name</label>
            <div class="input-wrapper">
              <span class="icon"><i class="fa fa-user"></i></span>
              <input type="text" id="patientName" name="patientName" readonly required>
            </div>
          </div>

          <div class="input-group">
            <label for="patientAge">Patient Age</label>
            <div class="input-wrapper">
              <span class="icon"><i class="fa fa-cake-candles"></i></span>
              <input type="number" id="patientAge" name="patientAge" readonly required>
            </div>
          </div>
          <div class="input-group">
            <label for="appointmentDate">Appointment Date</label>
            <div class="input-wrapper">
              <span class="icon"><i class="fa fa-calendar"></i></span>
              <input type="date" id="appointmentDate" name="appointmentDate" required>
            </div>
          </div>

          <div class="input-group">
            <label for="appointmentTime">Appointment Time</label>
            <div class="input-wrapper">
              <span class="icon"><i class="fa fa-clock"></i></span>
              <select id="appointmentTime" name="appointmentTime" required>
                <option value="">Select time slot</option>
                <option value="09:00">09:00 AM</option><option value="10:00">10:00 AM</option>
                <option value="11:00">11:00 AM</option><option value="12:00">12:00 PM</option>
                <option value="13:00">01:00 PM</option><option value="14:00">02:00 PM</option>
              </select>
            </div>
          </div>

          <div class="input-group">
            <label for="doctorId">Doctor</label>
            <div class="input-wrapper">
              <span class="icon"><i class="fa fa-user-doctor"></i></span>
              <select id="doctorId" name="doctorId" required>
                <option value="">Select Doctor</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save"><i class="fas fa-plus"></i> Save Appointment</button>
        </div>
      </form>
    </div>
  </main>

  <div id="successMessage" class="success-message" style="display:none;">
    <i class="fas fa-check-circle"></i>
    <span>Appointment booked successfully!</span>
  </div>
  
  <script>
    let loggedInPatient = null; // Variable to hold patient data

    // SCRIPT TO GET PATIENT DATA AND POPULATE DOCTORS
    document.addEventListener('DOMContentLoaded', async () => {
        // 1. Get Logged-in Patient and Autofill
        const patientDataString = sessionStorage.getItem('loggedInPatient');
        if (!patientDataString) {
            alert('You must be logged in as a patient to book an appointment.');
            window.location.href = '../Login/loginpage.html';
            return;
        }
        loggedInPatient = JSON.parse(patientDataString);

        // Autofill patient name and age and make them read-only
        document.getElementById('patientName').value = loggedInPatient.fullName;
        document.getElementById('patientAge').value = loggedInPatient.age;

        // 2. Populate Doctor Dropdown
        const doctorSelect = document.getElementById('doctorId');
        try {
            const response = await fetch('http://localhost:8080/api/doctors');
            if (!response.ok) throw new Error('Could not fetch doctors');
            const doctors = await response.json();
            
            doctors.forEach(doctor => {
                const option = document.createElement('option');
                option.value = doctor.id;
                option.textContent = `${doctor.fullName} (${doctor.specialization})`;
                doctorSelect.appendChild(option);
            });
        } catch (error) {
            console.error('Error populating doctors:', error);
        }
    });

    // SCRIPT TO HANDLE FORM SUBMISSION
    document.getElementById('appointmentForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const form = e.target;
        const date = form.appointmentDate.value;
        const time = form.appointmentTime.value;
        const appointmentDatetime = `${date}T${time}:00`;

        const appointmentData = {
            patientId: loggedInPatient.id, // Use the ID of the logged-in patient
            patientName: loggedInPatient.fullName, // Still send the name for display
            patientAge: loggedInPatient.age, // Still send the age for display
            appointmentDatetime: appointmentDatetime,
            doctorId: parseInt(form.doctorId.value)
        };

        try {
            const response = await fetch('http://localhost:8080/api/appointments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(appointmentData),
            });
            if (!response.ok) throw new Error('Failed to create appointment.');
            
            const successMessage = document.getElementById('successMessage');
            successMessage.style.display = 'flex';
            setTimeout(() => { successMessage.style.display = 'none'; }, 3000);
            form.reset();
            // Re-fill the read-only fields after reset
            document.getElementById('patientName').value = loggedInPatient.fullName;
            document.getElementById('patientAge').value = loggedInPatient.age;

        } catch (error) {
            console.error('Error creating appointment:', error);
            alert('Error: Could not save the appointment.');
        }
    });
  </script>

</body>
</html>
