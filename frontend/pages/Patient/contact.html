<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Receptionist | Hospital Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {margin: 0; padding: 0; box-sizing: border-box;}
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #1a1f2e 0%, #2c3447 100%);
      color: #e2e8f0;
      min-height: 100vh;
      line-height: 1.6;
    }
    .navbar {
      background: rgba(15,23,42,0.95);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      border-bottom: 1px solid rgba(51,65,85,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #60a5fa;
    }
    .nav-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.2rem;
      font-weight: 600;
      color: #e2e8f0;
    }
    .nav-header i { color: #10b981; font-size: 1.3rem;}
    .nav-links {list-style: none;}
    .btn-back {
      color: #94a3b8; text-decoration: none; padding: 0.5rem 1rem; border-radius: 8px;
      transition: all 0.3s ease; background: rgba(51,65,85,0.3); border: 1px solid rgba(51,65,85,0.5);
    }
    .btn-back:hover {background: rgba(51,65,85,0.5); color: #e2e8f0; transform: translateY(-1px);}
    .container {max-width: 650px; margin: 2rem auto; padding: 0 1rem;}
    .contact-card {
      background: rgba(30,41,59,0.85);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border: 1px solid rgba(51,65,85,0.3);
      padding: 2rem;
      margin-bottom: 2rem;
      display: flex; flex-direction: column; align-items: center;
    }
    .contact-card h2 {
      color: #60a5fa;
      font-size: 1.4rem;
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .contact-info {
      font-size: 1rem;
      width: 100%;
      background: rgba(51,65,85,0.18);
      border-radius: 12px;
      padding: 1rem;
      text-align: left;
    }
    .info-row {
      display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.8rem;
    }
    .info-label { color: #94a3b8; min-width: 120px;}
    .info-value { color: #e2e8f0; font-weight: 600;}
    .avatar {
      background: #60a5fa;
      color: white;
      font-size: 2.2rem;
      border-radius: 50%;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(96,165,250,0.18);
    }
    .btn.back-btn {
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      color: white;
      border: none;
      outline: none;
      font-weight: 600;
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(16,185,129,0.16);
      margin-top: 0.5rem;
    }
    .btn.back-btn:hover {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      transform: translateY(-2px);
      color: #e2e8f0;
    }
    @media (max-width: 600px) {
      .container {padding: 0;}
      .contact-card {padding: 1.2rem;}
      .info-row {flex-direction: column; align-items: flex-start;}
      .info-label {min-width: unset;}
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">🏥 ABC Hospital</div>
    <div class="nav-header"><i class="fas fa-phone"></i> Contact Receptionist</div>
    <ul class="nav-links">
      <li><a href="dashboard.html" class="btn-back">← Back to  Patient Dashboard</a></li>
    </ul>
  </nav>
  <div class="container">
    <div class="contact-card">
      <div class="avatar"><i class="fas fa-user-nurse"></i></div>
      <h2><i class="fas fa-phone"></i> Receptionist Information</h2>
      <div class="contact-info">
        <div class="info-row">
          <span class="info-label"><i class="fas fa-user"></i> Name:</span>
          <span class="info-value">Terry Bates</span>
        </div>
        <div class="info-row">
          <span class="info-label"><i class="fas fa-envelope"></i> Email:</span>
          <span class="info-value">terry.bates@abchospital.com</span>
        </div>
        <div class="info-row">
          <span class="info-label"><i class="fas fa-phone"></i> Phone:</span>
          <span class="info-value">(763) 491-2582</span>
        </div>
        <div class="info-row">
          <span class="info-label"><i class="fas fa-clock"></i> Working Hours:</span>
          <span class="info-value">Mon-Fri, 8:00 AM – 6:00 PM</span>
        </div>
        <div class="info-row">
          <span class="info-label"><i class="fas fa-location-dot"></i> Desk Location:</span>
          <span class="info-value">Main Reception, Building A</span>
        </div>
      </div>
    </div>
    <a href="dashboard.html" class="btn back-btn">← Back to Dashboard</a>
  </div>
</body>
</html>
