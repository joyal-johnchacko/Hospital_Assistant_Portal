<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header>
    <i class="fa-solid fa-hospital"></i> Patient Dashboard
  </header>

  <div class="container grid">
    <a href="create.html" class="card link-card">
      <h2><i class="fa-solid fa-calendar-check"></i> Appointments</h2>
      <p> Book your appointments.</p>
    </a>

    <a href="prescriptions.html" class="card link-card">
      <h2><i class="fa-solid fa-pills"></i> Prescriptions</h2>
      <p>Check your prescribed medicines and dosages.</p>
    </a>

    <a href="feedback.html" class="card link-card">
      <h2><i class="fa-solid fa-comment-medical"></i> Feedback</h2>
      <p>Read feedback and visit summaries.</p>
    </a>

    <a href="contact.html" class="card link-card">
      <h2><i class="fa-solid fa-phone"></i> Contact</h2>
      <p>Get receptionist phone number for support.</p>
    </a>
  </div>
</body>
</html>
